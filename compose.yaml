services:
  operator-init:
    image: ${DTF_OPERATOR_IMAGE:-ghcr.io/reserve-protocol/dtf-operator:main}
    profiles: ["init"]
    user: "${DTF_OPERATOR_UID:-0}:${DTF_OPERATOR_GID:-0}"
    working_dir: /workspace/dtf-operator
    command: ["node", "dist/cli/init-dtf-operator-key.js", "--runtime-dir", "/runtime"]
    environment:
      DTF_RUNTIME_DIR_HOST: ${DTF_RUNTIME_DIR_HOST:-}
      DTF_OPERATOR_UID: ${DTF_OPERATOR_UID:-}
      DTF_OPERATOR_GID: ${DTF_OPERATOR_GID:-}
      HOME: /tmp
    volumes:
      - ${DTF_RUNTIME_DIR:-./out/dtf-runtime}:/runtime

  proposer:
    image: ${DTF_OPERATOR_IMAGE:-ghcr.io/reserve-protocol/dtf-operator:main}
    profiles: ["proposer"]
    user: "${DTF_OPERATOR_UID:-0}:${DTF_OPERATOR_GID:-0}"
    working_dir: /workspace/dtf-operator
    command: ["node", "dist/cli/run-dtf-proposer-loop.js"]
    restart: "${RESTART_POLICY:-unless-stopped}"
    environment:
      FOLIO_ADDRESS: ${FOLIO_ADDRESS:-}
      CHAIN_ID: ${CHAIN_ID:-}
      RPC_URL: ${RPC_URL:-}
      MAINNET_RPC_URL: ${MAINNET_RPC_URL:-}
      BSC_RPC_URL: ${BSC_RPC_URL:-}
      BASE_RPC_URL: ${BASE_RPC_URL:-}
      SCOUT_ETL_API_KEY: ${SCOUT_ETL_API_KEY:-}
      SCOUT_ETL_BASE_URL: ${SCOUT_ETL_BASE_URL:-}
      SCOUT_ETL_PROVIDER: ${SCOUT_ETL_PROVIDER:-}
      ALLOW_SYNTHETIC_SIGNAL_STRATEGY: ${ALLOW_SYNTHETIC_SIGNAL_STRATEGY:-}
      ALLOW_PUBLIC_RPC: ${ALLOW_PUBLIC_RPC:-0}
      LIVE: ${LIVE:-0}
      ALLOW_BROADCAST: ${ALLOW_BROADCAST:-0}
      REQUIRE_SLACK: ${REQUIRE_SLACK:-0}
      RUN_HOURS: ${RUN_HOURS:-4}
      POLL_SECONDS: ${POLL_SECONDS:-20}
      COWBOT_SECONDS: ${COWBOT_SECONDS:-30}
      MAX_CYCLES: ${MAX_CYCLES:-}
      ONCE: ${ONCE:-0}
      STOP_AFTER_AUCTION_END: ${STOP_AFTER_AUCTION_END:-0}
      OBSERVE_ONLY: ${OBSERVE_ONLY:-0}
      SKIP_INITIAL_AUCTION_WAIT: ${SKIP_INITIAL_AUCTION_WAIT:-0}
      RUN_ID: ${RUN_ID:-}
      CHAIN_LABEL: ${CHAIN_LABEL:-}
      REGISTER_BASE_URL: ${REGISTER_BASE_URL:-}
      PROPOSAL_FROM_BLOCK: ${PROPOSAL_FROM_BLOCK:-}
      RESUME_PROPOSAL: ${RESUME_PROPOSAL:-}
      AUTO_REBALANCE_PROPOSAL_LOG_CHUNK_BLOCKS: ${AUTO_REBALANCE_PROPOSAL_LOG_CHUNK_BLOCKS:-}
      AUTO_REBALANCE_PROPOSAL_LOG_CHUNK_DELAY_MS: ${AUTO_REBALANCE_PROPOSAL_LOG_CHUNK_DELAY_MS:-}
      REBALANCE_CADENCE: ${REBALANCE_CADENCE:-}
      AUCTION_LAUNCHER_ADDRESS: ${AUCTION_LAUNCHER_ADDRESS:-}
      AUCTION_LAUNCHER_FOUNDRY_ACCOUNT: ${AUCTION_LAUNCHER_FOUNDRY_ACCOUNT:-}
      AUCTION_LAUNCHER_KEYSTORE_PASSWORD_FILE: /foundry/keystores/${AUCTION_LAUNCHER_KEYSTORE_PASSWORD_FILE_NAME:-.dtf-operator.password}
      PROJECT_ROOT: /workspace/dtf-operator
      OUT_ROOT: /data
      PROJECT_ENV_FILE: /config/project.env
      DEFAULT_PROJECT_ENV_FILE: /opt/dtf-operator/default-project.env
      CODEX_HOME: /runtime/codex
      HOME: /tmp
      FOUNDRY_KEYSTORE_DIR: /foundry/keystores
      FOUNDRY_KEYSTORE_PASSWORD_FILE: /foundry/keystores/${FOUNDRY_KEYSTORE_PASSWORD_FILE_NAME:-.dtf-operator.password}
      COWBOT_RUNNER: /workspace/dtf-operator/dist/cli/run-cowbot.js
    volumes:
      - ${PROPOSER_DATA_DIR:-./out/docker-dtf-proposer}:/data
      - ${PROJECT_ENV_FILE_HOST:-./config/project.env.example}:/config/project.env:ro
      - ${FOUNDRY_KEYSTORE_DIR_HOST:-/tmp/nonexistent-foundry-keystores}:/foundry/keystores:ro
      - ${CODEX_AUTH_DIR_HOST:-/tmp/nonexistent-codex-auth}:/runtime/codex:ro

  defender:
    image: ${DTF_OPERATOR_IMAGE:-ghcr.io/reserve-protocol/dtf-operator:main}
    profiles: ["defender"]
    user: "${DTF_OPERATOR_UID:-0}:${DTF_OPERATOR_GID:-0}"
    working_dir: /workspace/dtf-operator
    command: ["node", "dist/cli/run-dtf-defender.js"]
    restart: "${RESTART_POLICY:-unless-stopped}"
    environment:
      FOLIO_ADDRESS: ${FOLIO_ADDRESS:-}
      CHAIN_ID: ${CHAIN_ID:-}
      RPC_URL: ${RPC_URL:-}
      MAINNET_RPC_URL: ${MAINNET_RPC_URL:-}
      BSC_RPC_URL: ${BSC_RPC_URL:-}
      BASE_RPC_URL: ${BASE_RPC_URL:-}
      SCOUT_ETL_API_KEY: ${SCOUT_ETL_API_KEY:-}
      SCOUT_ETL_BASE_URL: ${SCOUT_ETL_BASE_URL:-}
      SCOUT_ETL_PROVIDER: ${SCOUT_ETL_PROVIDER:-}
      GOVERNOR_ADDRESS: ${GOVERNOR_ADDRESS:-}
      DEFENDER_CONFIG: ${DEFENDER_CONFIG:-}
      ALLOW_PUBLIC_RPC: ${ALLOW_PUBLIC_RPC:-0}
      PROJECT_ENV_FILE: /config/project.env
      DEFAULT_PROJECT_ENV_FILE: /opt/dtf-operator/default-project.env
      CODEX_HOME: /runtime/codex
      HOME: /tmp
      OUT_ROOT: /data
      OUT_DIR: /data
      RUN_ID: ${RUN_ID:-}
      RUN_HOURS: ${RUN_HOURS:-1}
      POLL_SECONDS: ${POLL_SECONDS:-20}
      WAIT_ACTIVE_SECONDS: ${WAIT_ACTIVE_SECONDS:-120}
      DEFENDER_FREQUENCY_MINUTES: ${DEFENDER_FREQUENCY_MINUTES:-}
      ONCE: ${ONCE:-0}
      LIVE: ${LIVE:-0}
      VETO_BROADCAST: ${VETO_BROADCAST:-0}
      AUTO_DELEGATE_OPTIMISTIC: ${AUTO_DELEGATE_OPTIMISTIC:-0}
      ENSURE_DELEGATE_ONLY: ${ENSURE_DELEGATE_ONLY:-0}
      REQUIRE_SLACK: ${REQUIRE_SLACK:-0}
      REQUIRE_AI_APPROVAL: ${REQUIRE_AI_APPROVAL:-0}
      ALERT_ONLY_WITHOUT_SIGNER: ${ALERT_ONLY_WITHOUT_SIGNER:-1}
      DEFENDER_EMAIL_TO: ${DEFENDER_EMAIL_TO:-}
      DEFENDER_EMAIL_FROM: ${DEFENDER_EMAIL_FROM:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      PROPOSAL_FROM_BLOCK: ${PROPOSAL_FROM_BLOCK:-}
      DEFENDER_PROPOSAL_LOG_CHUNK_BLOCKS: ${DEFENDER_PROPOSAL_LOG_CHUNK_BLOCKS:-}
      DEFENDER_PROPOSAL_LOG_CHUNK_DELAY_MS: ${DEFENDER_PROPOSAL_LOG_CHUNK_DELAY_MS:-}
      PROPOSAL_ID: ${PROPOSAL_ID:-}
      PROPOSAL_FILE: ${PROPOSAL_FILE:-}
      FOUNDRY_KEYSTORE_DIR: /foundry/keystores
      FOUNDRY_KEYSTORE_PASSWORD_FILE: /foundry/keystores/${FOUNDRY_KEYSTORE_PASSWORD_FILE_NAME:-.dtf-operator.password}
    volumes:
      - ${DEFENDER_DATA_DIR:-./out/docker-dtf-defender}:/data
      - ${PROJECT_ENV_FILE_HOST:-./config/project.env.example}:/config/project.env:ro
      - ${FOUNDRY_KEYSTORE_DIR_HOST:-/tmp/nonexistent-foundry-keystores}:/foundry/keystores:ro
      - ${CODEX_AUTH_DIR_HOST:-/tmp/nonexistent-codex-auth}:/runtime/codex:ro

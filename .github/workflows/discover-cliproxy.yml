name: Discover CLIProxyAPI

on:
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - name: Connect to tailnet
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: ${{ vars.TAILSCALE_TAGS }}
          use-cache: 'false'

      - name: Discover and configure CLIProxyAPI endpoint
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          INFERENCE_API_KEY: ${{ secrets.CLIPROXY_BEARER_TOKEN }}
        run: |
          set -euo pipefail
          [[ -n "$INFERENCE_API_KEY" ]] || { echo 'CLIPROXY_BEARER_TOKEN is required' >&2; exit 2; }
          mapfile -t peers < <(tailscale status --json | jq -r '.Peer | to_entries[] | select(.value.Online == true) | .value.DNSName // empty')
          selected=''
          for peer in "${peers[@]}"; do
            host="${peer%.}"
            for origin in "https://$host" "https://$host:8317"; do
              if curl -fsS --connect-timeout 4 --max-time 10 -o /dev/null \
                -H "Authorization: Bearer $INFERENCE_API_KEY" \
                "$origin/v1/models"; then
                selected="$origin/v1"
                break 2
              fi
            done
          done
          [[ -n "$selected" ]] || { echo 'No online tailnet peer exposed an authenticated HTTPS CLIProxyAPI /v1/models endpoint' >&2; exit 2; }
          gh variable set PROPOSER_INFERENCE_BASE_URL --body "$selected"
          gh variable set DEFENDER_INFERENCE_BASE_URL --body "$selected"
          echo 'Configured direct inference base URL variables.'

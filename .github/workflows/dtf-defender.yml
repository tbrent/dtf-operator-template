name: DTF Defender

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      proposal_log_chunk_blocks:
        description: Optional ProposalCreated log chunk size
        required: false
        default: ''
        type: string
      proposal_log_chunk_delay_ms:
        description: Optional delay between ProposalCreated log chunks, in milliseconds
        required: false
        default: ''
        type: string

permissions:
  contents: read
  packages: read

env:
  DTF_OPERATOR_IMAGE: ghcr.io/reserve-protocol/dtf-operator@sha256:bcbc1a8f9b12c4155978e1cf2ab018bd571915c79edaf2aadf303a0550445ca5
  DTF_OPERATOR_SOURCE_REVISION: fa307417a62fb6efd86d7b4cb2364e599dca2737
  CLI_PROXY_IMAGE: eceasy/cli-proxy-api@sha256:2d402a3edfbfa0612d7694345f7a05008fe8ce1915fde00ec9adb82afeb370c9

jobs:
  defender:
    if: ${{ github.repository != 'reserve-protocol/dtf-operator-template' && github.ref_name == github.event.repository.default_branch && (github.event_name == 'workflow_dispatch' || vars.DEFENDER_SCHEDULES_ENABLED == 'true') }}
    runs-on: ubuntu-latest
    concurrency:
      group: dtf-defender-${{ github.repository_id }}
      cancel-in-progress: false

    steps:
      - name: Checkout operator configuration
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Resolve Defender inference and isolation mode
        id: inference
        shell: bash
        env:
          DEFENDER_INFERENCE_MODE: ${{ vars.DEFENDER_INFERENCE_MODE }}
          DEFENDER_INFERENCE_PROVIDER: ${{ vars.DEFENDER_INFERENCE_PROVIDER || 'openai-compatible' }}
          DEFENDER_INFERENCE_BASE_URL: ${{ secrets.DEFENDER_INFERENCE_BASE_URL || vars.DEFENDER_INFERENCE_BASE_URL }}
          DEFENDER_INFERENCE_API_KEY: ${{ secrets.DEFENDER_INFERENCE_API_KEY }}
          PROPOSER_INFERENCE_MODE: ${{ vars.PROPOSER_INFERENCE_MODE }}
          CPA_PROPOSER_GITSTORE_URL: ${{ vars.CPA_PROPOSER_GITSTORE_URL }}
          CPA_PROPOSER_GITSTORE_BRANCH: ${{ vars.CPA_PROPOSER_GITSTORE_BRANCH }}
          CPA_DEFENDER_GITSTORE_URL: ${{ vars.CPA_DEFENDER_GITSTORE_URL }}
          CPA_DEFENDER_GITSTORE_BRANCH: ${{ vars.CPA_DEFENDER_GITSTORE_BRANCH }}
          CPA_DEFENDER_GITSTORE_TOKEN: ${{ secrets.CPA_DEFENDER_GITSTORE_TOKEN }}
          CPA_PROPOSER_OAUTH_IDENTITY: ${{ vars.CPA_PROPOSER_OAUTH_IDENTITY }}
          CPA_DEFENDER_OAUTH_IDENTITY: ${{ vars.CPA_DEFENDER_OAUTH_IDENTITY }}
          CPA_PROPOSER_OAUTH_FINGERPRINT: ${{ secrets.CPA_PROPOSER_OAUTH_FINGERPRINT }}
          CPA_DEFENDER_OAUTH_FINGERPRINT: ${{ secrets.CPA_DEFENDER_OAUTH_FINGERPRINT }}
          CPA_OAUTH_ISOLATION: ${{ vars.CPA_OAUTH_ISOLATION }}
          PROPOSER_SIGNER_ADDRESS: ${{ vars.PROPOSER_SIGNER_ADDRESS }}
          DEFENDER_SIGNER_ADDRESS: ${{ vars.DEFENDER_SIGNER_ADDRESS }}
          DEFENDER_KEYSTORE_JSON_B64: ${{ secrets.DEFENDER_KEYSTORE_JSON_B64 }}
          DEFENDER_KEYSTORE_PASSWORD: ${{ secrets.DEFENDER_KEYSTORE_PASSWORD }}
          DEFENDER_FOUNDRY_ACCOUNT: ${{ secrets.DEFENDER_FOUNDRY_ACCOUNT }}
          TS_OAUTH_CLIENT_ID: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          TS_OAUTH_SECRET: ${{ secrets.TS_OAUTH_SECRET }}
        run: |
          set -euo pipefail
          for required in \
            DEFENDER_INFERENCE_MODE DEFENDER_INFERENCE_API_KEY PROPOSER_INFERENCE_MODE \
            PROPOSER_SIGNER_ADDRESS DEFENDER_SIGNER_ADDRESS \
            DEFENDER_KEYSTORE_JSON_B64 DEFENDER_KEYSTORE_PASSWORD DEFENDER_FOUNDRY_ACCOUNT; do
            [[ -n "${!required:-}" ]] || { echo "$required is required" >&2; exit 2; }
          done
          [[ "$PROPOSER_SIGNER_ADDRESS" =~ ^0x[0-9a-fA-F]{40}$ && "$DEFENDER_SIGNER_ADDRESS" =~ ^0x[0-9a-fA-F]{40}$ ]] || { echo 'Proposer and Defender signer variables must be EVM addresses' >&2; exit 2; }
          [[ "${PROPOSER_SIGNER_ADDRESS,,}" != "${DEFENDER_SIGNER_ADDRESS,,}" ]] || { echo 'Proposer and Defender signers must differ' >&2; exit 2; }
          [[ "$DEFENDER_INFERENCE_PROVIDER" == openai-compatible || "$DEFENDER_INFERENCE_PROVIDER" == anthropic ]] || { echo 'DEFENDER_INFERENCE_PROVIDER must be openai-compatible or anthropic' >&2; exit 2; }

          tailscale=false
          if [[ -n "$TS_OAUTH_CLIENT_ID" || -n "$TS_OAUTH_SECRET" ]]; then
            [[ -n "$TS_OAUTH_CLIENT_ID" && -n "$TS_OAUTH_SECRET" ]] || { echo 'TS_OAUTH_CLIENT_ID and TS_OAUTH_SECRET must be configured together' >&2; exit 2; }
            tailscale=true
          fi
          [[ "$PROPOSER_INFERENCE_MODE" == direct || "$PROPOSER_INFERENCE_MODE" == cliproxy ]] || { echo 'PROPOSER_INFERENCE_MODE must be direct or cliproxy' >&2; exit 2; }

          case "$DEFENDER_INFERENCE_MODE" in
            direct)
              [[ -n "$DEFENDER_INFERENCE_BASE_URL" ]] || { echo 'DEFENDER_INFERENCE_BASE_URL is required in direct mode' >&2; exit 2; }
              [[ "$DEFENDER_INFERENCE_BASE_URL" =~ ^https://[^[:space:]/]+(/[^[:space:]]*)?$ ]] || { echo 'DEFENDER_INFERENCE_BASE_URL must be a single-line https URL in direct mode' >&2; exit 2; }
              case "$DEFENDER_INFERENCE_BASE_URL" in
                https://*@*) echo 'DEFENDER_INFERENCE_BASE_URL must not contain credentials' >&2; exit 2 ;;
                *\?*|*\#*) echo 'DEFENDER_INFERENCE_BASE_URL must not contain query parameters or a fragment' >&2; exit 2 ;;
              esac
              base_url="${DEFENDER_INFERENCE_BASE_URL%/}"
              case "$base_url" in
                */v1) ;;
                *) base_url="$base_url/v1" ;;
              esac
              ;;
            cliproxy)
              for required in \
                CPA_DEFENDER_GITSTORE_URL CPA_DEFENDER_GITSTORE_BRANCH CPA_DEFENDER_GITSTORE_TOKEN \
                CPA_DEFENDER_OAUTH_IDENTITY CPA_DEFENDER_OAUTH_FINGERPRINT; do
                [[ -n "${!required:-}" ]] || { echo "$required is required for cliproxy mode" >&2; exit 2; }
              done
              [[ "$CPA_DEFENDER_OAUTH_IDENTITY" =~ ^[A-Za-z0-9._@+-]+$ ]] || { echo 'CPA OAuth identity labels must use safe non-secret characters' >&2; exit 2; }
              [[ "$CPA_DEFENDER_OAUTH_FINGERPRINT" =~ ^[0-9a-f]{64}$ ]] || { echo 'CPA OAuth identity fingerprints are invalid' >&2; exit 2; }
              [[ "$CPA_DEFENDER_GITSTORE_BRANCH" =~ ^[A-Za-z0-9][A-Za-z0-9._/-]*$ && "$CPA_DEFENDER_GITSTORE_BRANCH" != *..* && "$CPA_DEFENDER_GITSTORE_BRANCH" != */ && "$CPA_DEFENDER_GITSTORE_BRANCH" != *//* ]] || { echo 'Git branch names must be safe' >&2; exit 2; }
              case "$CPA_DEFENDER_GITSTORE_URL" in
                http://*@*|https://*@*) echo 'Git URLs must not contain credentials' >&2; exit 2 ;;
              esac
              if [[ "$PROPOSER_INFERENCE_MODE" == cliproxy ]]; then
                for required in \
                  CPA_PROPOSER_GITSTORE_URL CPA_PROPOSER_GITSTORE_BRANCH \
                  CPA_PROPOSER_OAUTH_IDENTITY CPA_PROPOSER_OAUTH_FINGERPRINT CPA_OAUTH_ISOLATION; do
                  [[ -n "${!required:-}" ]] || { echo "$required is required when both roles use cliproxy" >&2; exit 2; }
                done
                [[ "$CPA_OAUTH_ISOLATION" == 'separate-gitstores-and-logins' ]] || { echo 'CPA_OAUTH_ISOLATION must confirm separate GitStores and OAuth logins' >&2; exit 2; }
                [[ "$CPA_PROPOSER_OAUTH_IDENTITY" =~ ^[A-Za-z0-9._@+-]+$ ]] || { echo 'CPA OAuth identity labels must use safe non-secret characters' >&2; exit 2; }
                [[ "${CPA_PROPOSER_OAUTH_IDENTITY,,}" != "${CPA_DEFENDER_OAUTH_IDENTITY,,}" ]] || { echo 'Proposer and Defender CPA OAuth identities must differ' >&2; exit 2; }
                [[ "$CPA_PROPOSER_OAUTH_FINGERPRINT" =~ ^[0-9a-f]{64}$ ]] || { echo 'CPA OAuth identity fingerprints are invalid' >&2; exit 2; }
                [[ "$CPA_PROPOSER_OAUTH_FINGERPRINT" != "$CPA_DEFENDER_OAUTH_FINGERPRINT" ]] || { echo 'Proposer and Defender CPA OAuth account fingerprints must differ' >&2; exit 2; }
                [[ "$CPA_PROPOSER_GITSTORE_BRANCH" =~ ^[A-Za-z0-9][A-Za-z0-9._/-]*$ && "$CPA_PROPOSER_GITSTORE_BRANCH" != *..* && "$CPA_PROPOSER_GITSTORE_BRANCH" != */ && "$CPA_PROPOSER_GITSTORE_BRANCH" != *//* ]] || { echo 'Git branch names must be safe' >&2; exit 2; }
                proposer_repo="${CPA_PROPOSER_GITSTORE_URL,,}"
                proposer_repo="${proposer_repo%/}"
                proposer_repo="${proposer_repo%.git}"
                defender_repo="${CPA_DEFENDER_GITSTORE_URL,,}"
                defender_repo="${defender_repo%/}"
                defender_repo="${defender_repo%.git}"
                [[ "$proposer_repo" != "$defender_repo" ]] || { echo 'Proposer and Defender CPA GitStores must use different repositories' >&2; exit 2; }
              fi
              base_url='http://cliproxy:8317/v1'
              ;;
            *)
              echo 'DEFENDER_INFERENCE_MODE must be direct or cliproxy' >&2
              exit 2
              ;;
          esac

          echo "mode=$DEFENDER_INFERENCE_MODE" >> "$GITHUB_OUTPUT"
          echo "provider=$DEFENDER_INFERENCE_PROVIDER" >> "$GITHUB_OUTPUT"
          echo "base_url=$base_url" >> "$GITHUB_OUTPUT"
          echo "tailscale=$tailscale" >> "$GITHUB_OUTPUT"

      - name: Restore Defender operator state
        id: defender_state_restore
        uses: actions/cache/restore@v6
        with:
          path: defender-data/operator-state
          key: dtf-defender-state-v1-${{ github.repository_id }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            dtf-defender-state-v1-${{ github.repository_id }}-

      - name: Pull and verify published operator
        id: pull_image
        shell: bash
        run: |
          set -euo pipefail
          expected_image='ghcr.io/reserve-protocol/dtf-operator@sha256:bcbc1a8f9b12c4155978e1cf2ab018bd571915c79edaf2aadf303a0550445ca5'
          expected_revision='fa307417a62fb6efd86d7b4cb2364e599dca2737'
          [[ "$DTF_OPERATOR_IMAGE" == "$expected_image" ]] || { echo 'unexpected operator image' >&2; exit 2; }
          [[ "$DTF_OPERATOR_SOURCE_REVISION" == "$expected_revision" ]] || { echo 'unexpected operator source revision' >&2; exit 2; }
          docker pull --platform linux/amd64 "$DTF_OPERATOR_IMAGE"
          platform="$(docker image inspect "$DTF_OPERATOR_IMAGE" --format '{{.Os}}/{{.Architecture}}')"
          revision="$(docker image inspect "$DTF_OPERATOR_IMAGE" --format '{{ index .Config.Labels "org.opencontainers.image.revision" }}')"
          [[ "$platform" == 'linux/amd64' ]] || { echo "operator image must be linux/amd64; got $platform" >&2; exit 2; }
          [[ "$revision" == "$expected_revision" ]] || { echo 'operator OCI revision does not match the reviewed source revision' >&2; exit 2; }
          echo "operator_image=$expected_image"
          echo "operator_source_revision=$expected_revision"
          echo "operator_platform=$platform"

      - name: Import legacy Git journal on first cache generation
        if: ${{ steps.defender_state_restore.outputs.cache-matched-key == '' }}
        shell: bash
        env:
          OPERATOR_STATE_GIT_URL: ${{ vars.CPA_DEFENDER_GITSTORE_URL }}
          OPERATOR_STATE_GIT_BRANCH: ${{ vars.OPERATOR_STATE_GIT_BRANCH }}
          OPERATOR_STATE_GIT_TOKEN: ${{ secrets.CPA_DEFENDER_GITSTORE_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p defender-data
          if [[ -z "$OPERATOR_STATE_GIT_BRANCH" ]]; then
            echo 'legacy_journal_import=fresh-cache'
            exit 0
          fi
          [[ -n "$OPERATOR_STATE_GIT_URL" && -n "$OPERATOR_STATE_GIT_TOKEN" ]] || { echo 'Legacy journal import requires CPA_DEFENDER_GITSTORE_URL and CPA_DEFENDER_GITSTORE_TOKEN when OPERATOR_STATE_GIT_BRANCH is configured' >&2; exit 2; }
          docker run --rm \
            --platform linux/amd64 \
            -e OPERATOR_STATE_MODE=git-authoritative \
            -e OPERATOR_STATE_ROOT=/data \
            -e OPERATOR_STATE_GIT_URL \
            -e OPERATOR_STATE_GIT_BRANCH \
            -e OPERATOR_STATE_GIT_TOKEN \
            -v "$PWD/defender-data:/data" \
            "$DTF_OPERATOR_IMAGE" \
            node dist/cli/run-defender-state.js restore
          echo 'legacy_journal_import=restored-read-only'

      - name: Connect Tailscale for direct inference
        if: ${{ steps.inference.outputs.mode == 'direct' && steps.inference.outputs.tailscale == 'true' }}
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: ${{ vars.TAILSCALE_TAGS || 'tag:github-actions' }}
          use-cache: 'false'

      - name: Verify direct inference endpoint
        if: ${{ steps.inference.outputs.mode == 'direct' }}
        shell: bash
        env:
          INFERENCE_PROVIDER: ${{ steps.inference.outputs.provider }}
          INFERENCE_BASE_URL: ${{ steps.inference.outputs.base_url }}
          INFERENCE_API_KEY: ${{ secrets.DEFENDER_INFERENCE_API_KEY }}
        run: |
          set -euo pipefail
          if [[ "$INFERENCE_PROVIDER" == anthropic ]]; then
            headers=(-H "x-api-key: $INFERENCE_API_KEY" -H 'anthropic-version: 2023-06-01')
          else
            headers=(-H "Authorization: Bearer $INFERENCE_API_KEY")
          fi
          curl -fsS -o /dev/null "${headers[@]}" "$INFERENCE_BASE_URL/models"

      - name: Start optional Defender GitStore inference sidecar
        if: ${{ steps.inference.outputs.mode == 'cliproxy' }}
        shell: bash
        env:
          GITSTORE_GIT_URL: ${{ vars.CPA_DEFENDER_GITSTORE_URL }}
          GITSTORE_GIT_BRANCH: ${{ vars.CPA_DEFENDER_GITSTORE_BRANCH }}
          GITSTORE_GIT_TOKEN: ${{ secrets.CPA_DEFENDER_GITSTORE_TOKEN }}
          GITSTORE_GIT_USERNAME: ${{ vars.CPA_GITSTORE_GIT_USERNAME }}
          MANAGEMENT_PASSWORD: ${{ secrets.DEFENDER_INFERENCE_API_KEY }}
        run: |
          set -euo pipefail
          repo_slug="${GITSTORE_GIT_URL#https://github.com/}"
          repo_slug="${repo_slug%.git}"
          api_status="$(curl -sS -o /dev/null -w '%{http_code}' \
            -H "Authorization: Bearer $GITSTORE_GIT_TOKEN" \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "https://api.github.com/repos/$repo_slug/branches/$GITSTORE_GIT_BRANCH" || true)"
          [[ "$api_status" == 200 ]] || { echo "Defender GitStore token branch check returned GitHub API HTTP $api_status" >&2; exit 2; }
          askpass="$(mktemp)"
          trap 'rm -f "$askpass"' EXIT
          cat > "$askpass" <<'EOF'
          #!/usr/bin/env bash
          case "$1" in
            *Username*) printf '%s\n' "$GITSTORE_GIT_USERNAME" ;;
            *Password*) printf '%s\n' "$GITSTORE_GIT_TOKEN" ;;
            *) exit 1 ;;
          esac
          EOF
          chmod 700 "$askpass"
          if ! GIT_ASKPASS="$askpass" GIT_TERMINAL_PROMPT=0 git ls-remote --exit-code "$GITSTORE_GIT_URL" "refs/heads/$GITSTORE_GIT_BRANCH" >/dev/null 2>&1; then
            echo 'Defender GitStore token cannot read the configured repository branch' >&2
            exit 2
          fi
          rm -f "$askpass"
          trap - EXIT
          mkdir -m 700 -p cliproxy-gitstore
          docker network create dtf-inference >/dev/null 2>&1 || true
          docker run -d \
            --name cliproxy \
            --network dtf-inference \
            -p 127.0.0.1:8317:8317 \
            -e GITSTORE_GIT_URL \
            -e GITSTORE_GIT_BRANCH \
            -e GITSTORE_GIT_TOKEN \
            -e GITSTORE_GIT_USERNAME \
            -e GITSTORE_LOCAL_PATH=/state \
            -e MANAGEMENT_PASSWORD \
            -v "$PWD/cliproxy-gitstore:/state" \
            "$CLI_PROXY_IMAGE" \
            /CLIProxyAPI/CLIProxyAPI
          for _ in {1..60}; do
            if curl -sf -H "Authorization: Bearer $MANAGEMENT_PASSWORD" http://127.0.0.1:8317/v0/management/auth-files >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          state="$(docker inspect cliproxy --format '{{.State.Status}} (exit {{.State.ExitCode}})' 2>/dev/null || printf 'missing')"
          echo "Defender CLIProxyAPI did not become ready; container state: $state" >&2
          exit 2

      - name: Verify optional Defender OAuth authority
        if: ${{ steps.inference.outputs.mode == 'cliproxy' }}
        shell: bash
        env:
          MANAGEMENT_PASSWORD: ${{ secrets.DEFENDER_INFERENCE_API_KEY }}
          INFERENCE_PROVIDER: ${{ steps.inference.outputs.provider }}
        run: |
          set -euo pipefail
          auth_files="$(curl -fsS -H "Authorization: Bearer $MANAGEMENT_PASSWORD" http://127.0.0.1:8317/v0/management/auth-files)"
          [[ "$auth_files" != *'"files":[]'* ]] || { echo 'Defender CPA GitStore contains no OAuth records' >&2; exit 2; }
          if [[ "$INFERENCE_PROVIDER" == anthropic ]]; then
            headers=(-H "x-api-key: $MANAGEMENT_PASSWORD" -H 'anthropic-version: 2023-06-01')
          else
            headers=(-H "Authorization: Bearer $MANAGEMENT_PASSWORD")
          fi
          curl -fsS -o /dev/null "${headers[@]}" http://127.0.0.1:8317/v1/models

      - name: Run serial multi-Folio Defender coordinator
        id: defender_runtime
        shell: bash
        env:
          DEFENDER_INFERENCE_MODE: ${{ steps.inference.outputs.mode }}
          INFERENCE_PROVIDER: ${{ steps.inference.outputs.provider }}
          INFERENCE_BASE_URL: ${{ steps.inference.outputs.base_url }}
          INFERENCE_API_KEY: ${{ secrets.DEFENDER_INFERENCE_API_KEY }}
          RPC_URL: ${{ secrets.RPC_URL || vars.RPC_URL }}
          MAINNET_RPC_URL: ${{ secrets.MAINNET_RPC_URL || vars.MAINNET_RPC_URL }}
          BSC_RPC_URL: ${{ secrets.BSC_RPC_URL || vars.BSC_RPC_URL }}
          BASE_RPC_URL: ${{ secrets.BASE_RPC_URL || vars.BASE_RPC_URL }}
          DEFENDER_KEYSTORE_JSON_B64: ${{ secrets.DEFENDER_KEYSTORE_JSON_B64 }}
          DEFENDER_KEYSTORE_PASSWORD: ${{ secrets.DEFENDER_KEYSTORE_PASSWORD }}
          DEFENDER_FOUNDRY_ACCOUNT: ${{ secrets.DEFENDER_FOUNDRY_ACCOUNT }}
          DEFENDER_SIGNER_ADDRESS: ${{ vars.DEFENDER_SIGNER_ADDRESS }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          DEFENDER_EMAIL_TO: ${{ secrets.DEFENDER_EMAIL_TO || vars.DEFENDER_EMAIL_TO }}
          DEFENDER_EMAIL_FROM: ${{ secrets.DEFENDER_EMAIL_FROM || vars.DEFENDER_EMAIL_FROM }}
          INFERENCE_AUTH_ALERT_COOLDOWN_SECONDS: ${{ vars.INFERENCE_AUTH_ALERT_COOLDOWN_SECONDS }}
          DEFENDER_PROPOSAL_LOG_CHUNK_BLOCKS: ${{ inputs.proposal_log_chunk_blocks || vars.DEFENDER_PROPOSAL_LOG_CHUNK_BLOCKS }}
          DEFENDER_PROPOSAL_LOG_CHUNK_DELAY_MS: ${{ inputs.proposal_log_chunk_delay_ms || vars.DEFENDER_PROPOSAL_LOG_CHUNK_DELAY_MS }}
        run: |
          set -euo pipefail
          mkdir -p defender-data
          if [[ "$DEFENDER_INFERENCE_MODE" == direct ]]; then
            network_args=(--network host)
          else
            network_args=(--network dtf-inference)
          fi
          docker run --rm \
            --platform linux/amd64 \
            "${network_args[@]}" \
            -e DTF_OPERATOR_CONFIG=/config/dtf-operator.yml \
            -e OUT_ROOT=/data \
            -e OPERATOR_STATE_ROOT=/data \
            -e OPERATOR_STATE_MODE=cache-authoritative \
            -e INFERENCE_PROVIDER \
            -e INFERENCE_BASE_URL \
            -e INFERENCE_API_KEY \
            -e RPC_URL \
            -e MAINNET_RPC_URL \
            -e BSC_RPC_URL \
            -e BASE_RPC_URL \
            -e DEFENDER_KEYSTORE_JSON_B64 \
            -e DEFENDER_KEYSTORE_PASSWORD \
            -e DEFENDER_FOUNDRY_ACCOUNT \
            -e DEFENDER_SIGNER_ADDRESS \
            -e RESEND_API_KEY \
            -e DEFENDER_EMAIL_TO \
            -e DEFENDER_EMAIL_FROM \
            -e INFERENCE_AUTH_ALERT_COOLDOWN_SECONDS \
            -e DEFENDER_PROPOSAL_LOG_CHUNK_BLOCKS \
            -e DEFENDER_PROPOSAL_LOG_CHUNK_DELAY_MS \
            -e GITHUB_SERVER_URL \
            -e GITHUB_REPOSITORY \
            -e GITHUB_EVENT_NAME \
            -e GITHUB_RUN_ID \
            -e GITHUB_RUN_ATTEMPT \
            -v "$PWD/.github/dtf-operator.yml:/config/dtf-operator.yml:ro" \
            -v "$PWD/defender-data:/data" \
            "$DTF_OPERATOR_IMAGE" \
            node dist/cli/run-github-defender.js

      - name: Normalize Defender state ownership
        if: ${{ always() && steps.defender_runtime.outcome != 'skipped' }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -d defender-data ]]; then
            sudo chown -R "$(id -u):$(id -g)" defender-data
          fi
          if [[ -d defender-data/operator-state ]]; then
            chmod -R u+rwX,go-rwx defender-data/operator-state
          fi

      - name: Validate Defender state for cache save
        id: validate_defender_state
        if: ${{ always() && steps.pull_image.outcome == 'success' && steps.defender_runtime.outcome != 'skipped' }}
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm \
            --platform linux/amd64 \
            -e OPERATOR_STATE_MODE=cache-authoritative \
            -e OPERATOR_STATE_ROOT=/data \
            -v "$PWD/defender-data:/data:ro" \
            "$DTF_OPERATOR_IMAGE" \
            node dist/cli/run-defender-state.js validate

      - name: Save Defender operator state
        if: ${{ always() && steps.validate_defender_state.outcome == 'success' }}
        uses: actions/cache/save@v6
        with:
          path: defender-data/operator-state
          key: ${{ steps.defender_state_restore.outputs.cache-primary-key }}

      - name: Stop optional sidecar and remove local state
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          docker stop --time 15 cliproxy >/dev/null 2>&1 || true
          docker rm -f cliproxy >/dev/null 2>&1 || true
          docker network rm dtf-inference >/dev/null 2>&1 || true
          sudo rm -rf cliproxy-gitstore defender-data 2>/dev/null || rm -rf cliproxy-gitstore defender-data

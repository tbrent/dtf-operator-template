name: DTF Defender

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      once:
        description: Run one scan and exit
        required: false
        default: true
        type: boolean
      run_hours:
        description: Optional RUN_HOURS override when once=false
        required: false
        default: ''
        type: string
      poll_seconds:
        description: Optional POLL_SECONDS override when once=false
        required: false
        default: ''
        type: string
      proposal_from_block:
        description: Optional ProposalCreated deployment floor for targeted recovery
        required: false
        default: ''
        type: string
      proposal_id:
        description: Optional exact proposal ID for durable veto recovery
        required: false
        default: ''
        type: string
      proposal_log_chunk_blocks:
        description: Optional ProposalCreated log chunk size
        required: false
        default: ''
        type: string
      proposal_log_chunk_delay_ms:
        description: Optional delay between ProposalCreated log chunks, in milliseconds
        required: false
        default: ''
        type: string

permissions:
  contents: read
  packages: read

env:
  DTF_OPERATOR_IMAGE: ghcr.io/reserve-protocol/dtf-operator@sha256:6cdc5c19d2c842575acd94b687febd49a688373caff121ec78649e6749d8a2d4
  DTF_OPERATOR_SOURCE_REVISION: 2d8246d4d31939a668d3586e6241d0b49ababc37
  CLI_PROXY_IMAGE: eceasy/cli-proxy-api@sha256:2d402a3edfbfa0612d7694345f7a05008fe8ce1915fde00ec9adb82afeb370c9

jobs:
  defender:
    if: ${{ github.repository != 'reserve-protocol/dtf-operator-template' && (github.event_name == 'workflow_dispatch' || vars.DTF_SCHEDULES_ENABLED == 'true') }}
    runs-on: ubuntu-latest
    concurrency:
      group: dtf-defender-${{ github.repository_id }}
      cancel-in-progress: false

    steps:
      - name: Checkout operator configuration
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Assert production isolation
        shell: bash
        env:
          CPA_PROPOSER_GITSTORE_URL: ${{ vars.CPA_PROPOSER_GITSTORE_URL }}
          CPA_PROPOSER_GITSTORE_BRANCH: ${{ vars.CPA_PROPOSER_GITSTORE_BRANCH }}
          CPA_DEFENDER_GITSTORE_URL: ${{ vars.CPA_DEFENDER_GITSTORE_URL }}
          CPA_DEFENDER_GITSTORE_BRANCH: ${{ vars.CPA_DEFENDER_GITSTORE_BRANCH }}
          CPA_DEFENDER_GITSTORE_TOKEN: ${{ secrets.CPA_DEFENDER_GITSTORE_TOKEN }}
          OPERATOR_STATE_GIT_URL: ${{ vars.OPERATOR_STATE_GIT_URL }}
          OPERATOR_STATE_GIT_BRANCH: ${{ vars.OPERATOR_STATE_GIT_BRANCH }}
          OPERATOR_STATE_GIT_TOKEN: ${{ secrets.OPERATOR_STATE_GIT_TOKEN }}
          CPA_PROPOSER_OAUTH_IDENTITY: ${{ vars.CPA_PROPOSER_OAUTH_IDENTITY }}
          CPA_DEFENDER_OAUTH_IDENTITY: ${{ vars.CPA_DEFENDER_OAUTH_IDENTITY }}
          CPA_PROPOSER_OAUTH_FINGERPRINT: ${{ secrets.CPA_PROPOSER_OAUTH_FINGERPRINT }}
          CPA_DEFENDER_OAUTH_FINGERPRINT: ${{ secrets.CPA_DEFENDER_OAUTH_FINGERPRINT }}
          CPA_OAUTH_ISOLATION: ${{ vars.CPA_OAUTH_ISOLATION }}
          PROPOSER_SIGNER_ADDRESS: ${{ vars.PROPOSER_SIGNER_ADDRESS }}
          DEFENDER_SIGNER_ADDRESS: ${{ vars.DEFENDER_SIGNER_ADDRESS }}
          DEFENDER_KEYSTORE_JSON_B64: ${{ secrets.DEFENDER_KEYSTORE_JSON_B64 }}
          DEFENDER_KEYSTORE_PASSWORD: ${{ secrets.DEFENDER_KEYSTORE_PASSWORD }}
          DEFENDER_FOUNDRY_ACCOUNT: ${{ secrets.DEFENDER_FOUNDRY_ACCOUNT }}
          DEFENDER_INFERENCE_API_KEY: ${{ secrets.DEFENDER_INFERENCE_API_KEY }}
        run: |
          set -euo pipefail
          for required in \
            CPA_PROPOSER_GITSTORE_URL CPA_PROPOSER_GITSTORE_BRANCH \
            CPA_DEFENDER_GITSTORE_URL CPA_DEFENDER_GITSTORE_BRANCH CPA_DEFENDER_GITSTORE_TOKEN \
            OPERATOR_STATE_GIT_URL OPERATOR_STATE_GIT_BRANCH OPERATOR_STATE_GIT_TOKEN \
            CPA_PROPOSER_OAUTH_IDENTITY CPA_DEFENDER_OAUTH_IDENTITY \
            CPA_PROPOSER_OAUTH_FINGERPRINT CPA_DEFENDER_OAUTH_FINGERPRINT CPA_OAUTH_ISOLATION \
            PROPOSER_SIGNER_ADDRESS DEFENDER_SIGNER_ADDRESS \
            DEFENDER_KEYSTORE_JSON_B64 DEFENDER_KEYSTORE_PASSWORD DEFENDER_FOUNDRY_ACCOUNT DEFENDER_INFERENCE_API_KEY; do
            [[ -n "${!required:-}" ]] || { echo "$required is required" >&2; exit 2; }
          done
          [[ "$CPA_OAUTH_ISOLATION" == 'separate-gitstores-and-logins' ]] || { echo 'CPA_OAUTH_ISOLATION must confirm separate GitStores and OAuth logins' >&2; exit 2; }
          [[ "$CPA_PROPOSER_OAUTH_IDENTITY" =~ ^[A-Za-z0-9._@+-]+$ && "$CPA_DEFENDER_OAUTH_IDENTITY" =~ ^[A-Za-z0-9._@+-]+$ ]] || { echo 'CPA OAuth identity labels must use safe non-secret characters' >&2; exit 2; }
          [[ "${CPA_PROPOSER_OAUTH_IDENTITY,,}" != "${CPA_DEFENDER_OAUTH_IDENTITY,,}" ]] || { echo 'Proposer and Defender CPA OAuth identities must differ' >&2; exit 2; }
          [[ "$CPA_PROPOSER_OAUTH_FINGERPRINT" =~ ^[0-9a-f]{64}$ && "$CPA_DEFENDER_OAUTH_FINGERPRINT" =~ ^[0-9a-f]{64}$ ]] || { echo 'CPA OAuth identity fingerprints are invalid' >&2; exit 2; }
          [[ "$CPA_PROPOSER_OAUTH_FINGERPRINT" != "$CPA_DEFENDER_OAUTH_FINGERPRINT" ]] || { echo 'Proposer and Defender CPA OAuth account fingerprints must differ' >&2; exit 2; }
          proposer_domain="$CPA_PROPOSER_GITSTORE_URL#$CPA_PROPOSER_GITSTORE_BRANCH"
          defender_domain="$CPA_DEFENDER_GITSTORE_URL#$CPA_DEFENDER_GITSTORE_BRANCH"
          journal_domain="$OPERATOR_STATE_GIT_URL#$OPERATOR_STATE_GIT_BRANCH"
          [[ "$proposer_domain" != "$defender_domain" && "$proposer_domain" != "$journal_domain" && "$defender_domain" != "$journal_domain" ]] || { echo 'Proposer CPA, Defender CPA, and Defender journal write domains must be pairwise distinct' >&2; exit 2; }
          for url in "$CPA_PROPOSER_GITSTORE_URL" "$CPA_DEFENDER_GITSTORE_URL" "$OPERATOR_STATE_GIT_URL"; do
            case "$url" in
              http://*@*|https://*@*) echo 'Git URLs must not contain credentials' >&2; exit 2 ;;
            esac
          done
          [[ "$PROPOSER_SIGNER_ADDRESS" =~ ^0x[0-9a-fA-F]{40}$ && "$DEFENDER_SIGNER_ADDRESS" =~ ^0x[0-9a-fA-F]{40}$ ]] || { echo 'Proposer and Defender signer variables must be EVM addresses' >&2; exit 2; }
          [[ "${PROPOSER_SIGNER_ADDRESS,,}" != "${DEFENDER_SIGNER_ADDRESS,,}" ]] || { echo 'Proposer and Defender signers must differ' >&2; exit 2; }

      - name: Pull and verify published operator
        id: pull_image
        shell: bash
        run: |
          set -euo pipefail
          expected_image='ghcr.io/reserve-protocol/dtf-operator@sha256:6cdc5c19d2c842575acd94b687febd49a688373caff121ec78649e6749d8a2d4'
          expected_revision='2d8246d4d31939a668d3586e6241d0b49ababc37'
          [[ "$DTF_OPERATOR_IMAGE" == "$expected_image" ]] || { echo 'unexpected operator image' >&2; exit 2; }
          [[ "$DTF_OPERATOR_SOURCE_REVISION" == "$expected_revision" ]] || { echo 'unexpected operator source revision' >&2; exit 2; }
          docker pull --platform linux/amd64 "$DTF_OPERATOR_IMAGE"
          platform="$(docker image inspect "$DTF_OPERATOR_IMAGE" --format '{{.Os}}/{{.Architecture}}')"
          revision="$(docker image inspect "$DTF_OPERATOR_IMAGE" --format '{{ index .Config.Labels "org.opencontainers.image.revision" }}')"
          [[ "$platform" == 'linux/amd64' ]] || { echo "operator image must be linux/amd64; got $platform" >&2; exit 2; }
          [[ "$revision" == "$DTF_OPERATOR_SOURCE_REVISION" ]] || { echo 'operator OCI revision does not match the reviewed source revision' >&2; exit 2; }
          echo "operator_image=$DTF_OPERATOR_IMAGE"
          echo "operator_source_revision=$DTF_OPERATOR_SOURCE_REVISION"
          echo "operator_platform=$platform"

      - name: Start Defender GitStore inference sidecar
        shell: bash
        env:
          GITSTORE_GIT_URL: ${{ vars.CPA_DEFENDER_GITSTORE_URL }}
          GITSTORE_GIT_BRANCH: ${{ vars.CPA_DEFENDER_GITSTORE_BRANCH }}
          GITSTORE_GIT_TOKEN: ${{ secrets.CPA_DEFENDER_GITSTORE_TOKEN }}
          GITSTORE_GIT_USERNAME: ${{ vars.CPA_GITSTORE_GIT_USERNAME }}
          MANAGEMENT_PASSWORD: ${{ secrets.DEFENDER_INFERENCE_API_KEY }}
        run: |
          set -euo pipefail
          askpass="$(mktemp)"
          trap 'rm -f "$askpass"' EXIT
          cat > "$askpass" <<'EOF'
          #!/usr/bin/env bash
          case "$1" in
            *Username*) printf '%s\n' "$GITSTORE_GIT_USERNAME" ;;
            *Password*) printf '%s\n' "$GITSTORE_GIT_TOKEN" ;;
            *) exit 1 ;;
          esac
          EOF
          chmod 700 "$askpass"
          if ! GIT_ASKPASS="$askpass" GIT_TERMINAL_PROMPT=0 git ls-remote --exit-code "$GITSTORE_GIT_URL" "refs/heads/$GITSTORE_GIT_BRANCH" >/dev/null 2>&1; then
            echo 'Defender GitStore token cannot read the configured repository branch' >&2
            exit 2
          fi
          rm -f "$askpass"
          trap - EXIT
          mkdir -m 700 -p cliproxy-gitstore
          docker network create dtf-inference >/dev/null 2>&1 || true
          docker run -d \
            --name cliproxy \
            --network dtf-inference \
            -p 127.0.0.1:8317:8317 \
            -e GITSTORE_GIT_URL \
            -e GITSTORE_GIT_BRANCH \
            -e GITSTORE_GIT_TOKEN \
            -e GITSTORE_GIT_USERNAME \
            -e GITSTORE_LOCAL_PATH=/state \
            -e MANAGEMENT_PASSWORD \
            -v "$PWD/cliproxy-gitstore:/state" \
            "$CLI_PROXY_IMAGE" \
            /CLIProxyAPI/CLIProxyAPI
          for _ in {1..60}; do
            if curl -sf -H "Authorization: Bearer $MANAGEMENT_PASSWORD" http://127.0.0.1:8317/v0/management/auth-files >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          state="$(docker inspect cliproxy --format '{{.State.Status}} (exit {{.State.ExitCode}})' 2>/dev/null || printf 'missing')"
          echo "Defender CLIProxyAPI did not become ready; container state: $state" >&2
          exit 2

      - name: Verify Defender OAuth authority
        shell: bash
        env:
          MANAGEMENT_PASSWORD: ${{ secrets.DEFENDER_INFERENCE_API_KEY }}
        run: |
          set -euo pipefail
          auth_files="$(curl -fsS -H "Authorization: Bearer $MANAGEMENT_PASSWORD" http://127.0.0.1:8317/v0/management/auth-files)"
          [[ "$auth_files" != *'"files":[]'* ]] || { echo 'Defender CPA GitStore contains no OAuth records' >&2; exit 2; }

      - name: Run serial multi-Folio Defender coordinator
        shell: bash
        env:
          INFERENCE_API_KEY: ${{ secrets.DEFENDER_INFERENCE_API_KEY }}
          RPC_URL: ${{ secrets.RPC_URL || vars.RPC_URL }}
          MAINNET_RPC_URL: ${{ secrets.MAINNET_RPC_URL || vars.MAINNET_RPC_URL }}
          BSC_RPC_URL: ${{ secrets.BSC_RPC_URL || vars.BSC_RPC_URL }}
          BASE_RPC_URL: ${{ secrets.BASE_RPC_URL || vars.BASE_RPC_URL }}
          DEFENDER_KEYSTORE_JSON_B64: ${{ secrets.DEFENDER_KEYSTORE_JSON_B64 }}
          DEFENDER_KEYSTORE_PASSWORD: ${{ secrets.DEFENDER_KEYSTORE_PASSWORD }}
          DEFENDER_FOUNDRY_ACCOUNT: ${{ secrets.DEFENDER_FOUNDRY_ACCOUNT }}
          DEFENDER_SIGNER_ADDRESS: ${{ vars.DEFENDER_SIGNER_ADDRESS }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          DEFENDER_EMAIL_TO: ${{ secrets.DEFENDER_EMAIL_TO || vars.DEFENDER_EMAIL_TO }}
          DEFENDER_EMAIL_FROM: ${{ secrets.DEFENDER_EMAIL_FROM || vars.DEFENDER_EMAIL_FROM }}
          INFERENCE_AUTH_ALERT_COOLDOWN_SECONDS: ${{ vars.INFERENCE_AUTH_ALERT_COOLDOWN_SECONDS }}
          ONCE_INPUT: ${{ inputs.once }}
          RUN_HOURS_INPUT: ${{ inputs.run_hours }}
          POLL_SECONDS_INPUT: ${{ inputs.poll_seconds }}
          PROPOSAL_FROM_BLOCK_INPUT: ${{ inputs.proposal_from_block }}
          PROPOSAL_ID: ${{ inputs.proposal_id }}
          DEFENDER_PROPOSAL_LOG_CHUNK_BLOCKS: ${{ inputs.proposal_log_chunk_blocks || vars.DEFENDER_PROPOSAL_LOG_CHUNK_BLOCKS }}
          DEFENDER_PROPOSAL_LOG_CHUNK_DELAY_MS: ${{ inputs.proposal_log_chunk_delay_ms || vars.DEFENDER_PROPOSAL_LOG_CHUNK_DELAY_MS }}
          OPERATOR_STATE_GIT_URL: ${{ vars.OPERATOR_STATE_GIT_URL }}
          OPERATOR_STATE_GIT_BRANCH: ${{ vars.OPERATOR_STATE_GIT_BRANCH }}
          OPERATOR_STATE_GIT_TOKEN: ${{ secrets.OPERATOR_STATE_GIT_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p defender-data
          docker run --rm \
            --platform linux/amd64 \
            --network dtf-inference \
            -e DTF_OPERATOR_CONFIG=/config/dtf-operator.yml \
            -e OUT_ROOT=/data \
            -e INFERENCE_BASE_URL=http://cliproxy:8317/v1 \
            -e INFERENCE_API_KEY \
            -e RPC_URL \
            -e MAINNET_RPC_URL \
            -e BSC_RPC_URL \
            -e BASE_RPC_URL \
            -e DEFENDER_KEYSTORE_JSON_B64 \
            -e DEFENDER_KEYSTORE_PASSWORD \
            -e DEFENDER_FOUNDRY_ACCOUNT \
            -e DEFENDER_SIGNER_ADDRESS \
            -e RESEND_API_KEY \
            -e DEFENDER_EMAIL_TO \
            -e DEFENDER_EMAIL_FROM \
            -e INFERENCE_AUTH_ALERT_COOLDOWN_SECONDS \
            -e ONCE_INPUT \
            -e RUN_HOURS_INPUT \
            -e POLL_SECONDS_INPUT \
            -e PROPOSAL_FROM_BLOCK_INPUT \
            -e PROPOSAL_ID \
            -e DEFENDER_PROPOSAL_LOG_CHUNK_BLOCKS \
            -e DEFENDER_PROPOSAL_LOG_CHUNK_DELAY_MS \
            -e GITHUB_SERVER_URL \
            -e GITHUB_REPOSITORY \
            -e GITHUB_EVENT_NAME \
            -e GITHUB_RUN_ID \
            -e GITHUB_RUN_ATTEMPT \
            -e OPERATOR_STATE_GIT_URL \
            -e OPERATOR_STATE_GIT_BRANCH \
            -e OPERATOR_STATE_GIT_TOKEN \
            -e OPERATOR_STATE_MODE=git-authoritative \
            -v "$PWD/.github/dtf-operator.yml:/config/dtf-operator.yml:ro" \
            -v "$PWD/defender-data:/data" \
            "$DTF_OPERATOR_IMAGE" \
            node dist/cli/run-github-defender.js

      - name: Stop sidecar and remove local state
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          docker stop --time 15 cliproxy >/dev/null 2>&1 || true
          docker rm -f cliproxy >/dev/null 2>&1 || true
          docker network rm dtf-inference >/dev/null 2>&1 || true
          sudo rm -rf cliproxy-gitstore defender-data 2>/dev/null || rm -rf cliproxy-gitstore defender-data

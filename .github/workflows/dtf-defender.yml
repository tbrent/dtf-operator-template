name: DTF Defender

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      once:
        description: Run one scan and exit; set false to keep polling for run_hours
        required: false
        default: true
        type: boolean
      operator_image:
        description: Optional runtime image override; default is DTF_OPERATOR_IMAGE or the upstream stable image
        required: false
        default: ''
        type: string
      run_hours:
        description: Optional RUN_HOURS override when once=false
        required: false
        default: ''
        type: string
      poll_seconds:
        description: Optional POLL_SECONDS override when once=false
        required: false
        default: ''
        type: string
      proposal_from_block:
        description: Optional ProposalCreated scan start block for targeted veto runs
        required: false
        default: ''
        type: string
      proposal_log_chunk_blocks:
        description: Optional ProposalCreated log chunk size for RPC providers with small eth_getLogs limits
        required: false
        default: ''
        type: string
      proposal_log_chunk_delay_ms:
        description: Optional delay between ProposalCreated log chunks, in milliseconds
        required: false
        default: ''
        type: string

permissions:
  contents: read
  actions: write
  packages: read

env:
  DTF_OPERATOR_IMAGE: ${{ vars.DTF_OPERATOR_IMAGE || 'ghcr.io/reserve-protocol/dtf-operator:stable' }}

jobs:
  defender:
    if: ${{ github.repository != 'reserve-protocol/dtf-operator-template' && vars.DTF_ACTIONS_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    concurrency:
      group: dtf-codex-auth-${{ github.repository_id }}
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore defender state
        uses: actions/cache/restore@v4
        with:
          path: .defender-state
          key: defender-state-${{ github.repository_id }}-${{ github.ref_name }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            defender-state-${{ github.repository_id }}-${{ github.ref_name }}-
            defender-state-${{ github.repository_id }}-

      - name: Restore operator alert state
        uses: actions/cache/restore@v4
        with:
          path: .operator-alert-state
          key: operator-alert-state-${{ github.repository_id }}-${{ github.ref_name }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            operator-alert-state-${{ github.repository_id }}-${{ github.ref_name }}-
            operator-alert-state-${{ github.repository_id }}-

      - name: Restore encrypted CLIProxy auth cache
        uses: actions/cache/restore@v4
        with:
          path: .cliproxy-auth-cache/cliproxy-auth.tgz.enc
          key: cliproxy-auth-cache-${{ github.repository_id }}-${{ github.ref_name }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            cliproxy-auth-cache-${{ github.repository_id }}-${{ github.ref_name }}-
            cliproxy-auth-cache-${{ github.repository_id }}-

      - name: Restore CLIProxy auth state
        id: restore_cliproxy_auth
        shell: bash
        env:
          CLIPROXY_AUTH_TGZ_B64: ${{ secrets.CLIPROXY_AUTH_TGZ_B64 }}
        run: |
          set -euo pipefail
          umask 077
          if [[ -z "${CLIPROXY_AUTH_TGZ_B64:-}" ]]; then
            echo "CLIPROXY_AUTH_TGZ_B64 secret is required" >&2
            exit 2
          fi
          rm -rf cliproxy-auth cliproxy-auth.tgz
          mkdir -p .cliproxy-auth-cache
          if [[ -f .cliproxy-auth-cache/cliproxy-auth.tgz.enc ]]; then
            if scripts/codex-auth-cache decrypt .cliproxy-auth-cache/cliproxy-auth.tgz.enc cliproxy-auth.tgz && \
              mkdir -p cliproxy-auth && \
              tar --no-same-owner -xzf cliproxy-auth.tgz -C cliproxy-auth; then
              rm -f cliproxy-auth.tgz
              echo "auth_ready=true" >> "$GITHUB_OUTPUT"
              echo "cliproxy_auth_cache=restored"
              exit 0
            fi
            echo "cliproxy_auth_cache=restore_failed_bootstrap"
            rm -rf cliproxy-auth cliproxy-auth.tgz
          fi
          mkdir -p cliproxy-auth
          printf '%s' "$CLIPROXY_AUTH_TGZ_B64" | base64 --decode | tar --no-same-owner -xzf - -C cliproxy-auth
          echo "auth_ready=true" >> "$GITHUB_OUTPUT"
          echo "cliproxy_auth_cache=bootstrap"

      - name: Resolve operator image
        shell: bash
        run: |
          set -euo pipefail
          operator_image="$OPERATOR_IMAGE_INPUT"
          if [[ -n "$operator_image" ]]; then
            if [[ ! "$operator_image" =~ ^[A-Za-z0-9._/@:-]+$ ]]; then
              echo "operator_image contains unsupported characters" >&2
              exit 2
            fi
            printf 'DTF_OPERATOR_IMAGE=%s\n' "$operator_image" >> "$GITHUB_ENV"
          fi
          echo "operator_image=${operator_image:-$DTF_OPERATOR_IMAGE}"
        env:
          OPERATOR_IMAGE_INPUT: ${{ inputs.operator_image }}

      - name: Pull operator image
        shell: bash
        run: |
          set -euo pipefail
          if docker pull "$DTF_OPERATOR_IMAGE"; then
            exit 0
          fi
          echo "docker pull failed for $DTF_OPERATOR_IMAGE" >&2
          echo "The default runtime image is public. If you overrode DTF_OPERATOR_IMAGE, set it to a readable linux/amd64 image." >&2
          exit 2

      - name: Verify operator image platform
        shell: bash
        run: |
          set -euo pipefail
          platform="$(docker image inspect "$DTF_OPERATOR_IMAGE" --format '{{.Os}}/{{.Architecture}}')"
          echo "operator_image=$DTF_OPERATOR_IMAGE"
          echo "operator_image_platform=$platform"
          if [[ "$platform" != "linux/amd64" ]]; then
            echo "DTF_OPERATOR_IMAGE must resolve to linux/amd64 on GitHub ubuntu runners; got $platform" >&2
            exit 2
          fi

      - name: Start CLIProxyAPI inference sidecar
        shell: bash
        run: |
          set -euo pipefail
          docker network create dtf-inference >/dev/null 2>&1 || true
          cat > cliproxy.config.yaml <<EOF
          host: "0.0.0.0"
          port: 8317
          remote-management:
            allow-remote: false
            secret-key: ""
            disable-control-panel: true
          auth-dir: "/root/.cli-proxy-api"
          api-keys:
            - "$INFERENCE_API_KEY"
          debug: false
          logging-to-file: false
          usage-statistics-enabled: false
          commercial-mode: true
          request-retry: 0
          disable-cooling: true
          save-cooldown-status: false
          ws-auth: true
          EOF
          docker rm -f cliproxy >/dev/null 2>&1 || true
          docker run -d \
            --name cliproxy \
            --network dtf-inference \
            -p 127.0.0.1:8317:8317 \
            -v "$PWD/cliproxy.config.yaml:/CLIProxyAPI/config.yaml:ro" \
            -v "$PWD/cliproxy-auth:/root/.cli-proxy-api" \
            "${CLI_PROXY_IMAGE:-eceasy/cli-proxy-api:latest}" \
            /CLIProxyAPI/CLIProxyAPI -config /CLIProxyAPI/config.yaml
          for _ in {1..60}; do
            if curl -sf -H "Authorization: Bearer $INFERENCE_API_KEY" http://127.0.0.1:8317/v1/models >/dev/null; then
              echo "cliproxy_ready"
              curl -s -H "Authorization: Bearer $INFERENCE_API_KEY" http://127.0.0.1:8317/v1/models
              exit 0
            fi
            sleep 1
          done
          echo "cliproxy did not become ready" >&2
          exit 2
        env:
          INFERENCE_API_KEY: ${{ secrets.INFERENCE_API_KEY }}
          CLI_PROXY_IMAGE: ${{ vars.CLI_PROXY_IMAGE }}

      - name: Run defender
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .defender-state .operator-alert-state
          docker run --rm \
            --network dtf-inference \
            -e DTF_OPERATOR_CONFIG=/config/dtf-operator.yml \
            -e RUNTIME_DIR=/runtime \
            -e OUT_ROOT=/data \
            -e DEFAULT_PROJECT_ENV_FILE=/opt/dtf-operator/default-project.env \
            -e INFERENCE_BASE_URL \
            -e INFERENCE_API_KEY \
            -e ONCE_INPUT \
            -e RUN_HOURS_INPUT \
            -e POLL_SECONDS_INPUT \
            -e PROPOSAL_FROM_BLOCK_INPUT \
            -e DEFENDER_PROPOSAL_LOG_CHUNK_BLOCKS \
            -e DEFENDER_PROPOSAL_LOG_CHUNK_DELAY_MS \
            -e PROPOSER_KEYSTORE_JSON_B64 \
            -e PROPOSER_KEYSTORE_PASSWORD \
            -e DEFENDER_KEYSTORE_JSON_B64 \
            -e DEFENDER_KEYSTORE_PASSWORD \
            -e DEFENDER_FOUNDRY_ACCOUNT \
            -e RESEND_API_KEY \
            -e DEFENDER_EMAIL_TO \
            -e DEFENDER_EMAIL_FROM \
            -e FOUNDRY_ACCOUNT \
            -e RPC_URL \
            -e MAINNET_RPC_URL \
            -e BSC_RPC_URL \
            -e BASE_RPC_URL \
            -e GITHUB_SERVER_URL \
            -e GITHUB_REPOSITORY \
            -e GITHUB_RUN_ID \
            -e GITHUB_EVENT_NAME \
            -v "$PWD/.github/dtf-operator.yml:/config/dtf-operator.yml:ro" \
            -v "$PWD/.defender-state:/data" \
            -v "$PWD/.operator-alert-state:/alert-state" \
            "$DTF_OPERATOR_IMAGE" \
            node dist/cli/run-github-defender.js
        env:
          INFERENCE_BASE_URL: http://cliproxy:8317/v1
          INFERENCE_API_KEY: ${{ secrets.INFERENCE_API_KEY }}
          PROPOSER_KEYSTORE_JSON_B64: ${{ secrets.PROPOSER_KEYSTORE_JSON_B64 }}
          PROPOSER_KEYSTORE_PASSWORD: ${{ secrets.PROPOSER_KEYSTORE_PASSWORD }}
          DEFENDER_KEYSTORE_JSON_B64: ${{ secrets.DEFENDER_KEYSTORE_JSON_B64 }}
          DEFENDER_KEYSTORE_PASSWORD: ${{ secrets.DEFENDER_KEYSTORE_PASSWORD }}
          DEFENDER_FOUNDRY_ACCOUNT: ${{ secrets.DEFENDER_FOUNDRY_ACCOUNT || vars.DEFENDER_FOUNDRY_ACCOUNT }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          DEFENDER_EMAIL_TO: ${{ secrets.DEFENDER_EMAIL_TO }}
          DEFENDER_EMAIL_FROM: ${{ secrets.DEFENDER_EMAIL_FROM || vars.DEFENDER_EMAIL_FROM }}
          FOUNDRY_ACCOUNT: ${{ secrets.DEFENDER_FOUNDRY_ACCOUNT || vars.DEFENDER_FOUNDRY_ACCOUNT || secrets.FOUNDRY_ACCOUNT }}
          RPC_URL: ${{ secrets.RPC_URL || vars.RPC_URL }}
          MAINNET_RPC_URL: ${{ secrets.MAINNET_RPC_URL || vars.MAINNET_RPC_URL }}
          BSC_RPC_URL: ${{ secrets.BSC_RPC_URL || vars.BSC_RPC_URL }}
          BASE_RPC_URL: ${{ secrets.BASE_RPC_URL || vars.BASE_RPC_URL }}
          ONCE_INPUT: ${{ inputs.once }}
          RUN_HOURS_INPUT: ${{ inputs.run_hours }}
          POLL_SECONDS_INPUT: ${{ inputs.poll_seconds }}
          PROPOSAL_FROM_BLOCK_INPUT: ${{ inputs.proposal_from_block }}
          DEFENDER_PROPOSAL_LOG_CHUNK_BLOCKS: ${{ inputs.proposal_log_chunk_blocks || vars.DEFENDER_PROPOSAL_LOG_CHUNK_BLOCKS }}
          DEFENDER_PROPOSAL_LOG_CHUNK_DELAY_MS: ${{ inputs.proposal_log_chunk_delay_ms || vars.DEFENDER_PROPOSAL_LOG_CHUNK_DELAY_MS }}

      - name: Stop inference sidecar
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if docker container inspect cliproxy >/dev/null 2>&1; then
            docker stop --time 15 cliproxy >/dev/null 2>&1 || docker rm -f cliproxy >/dev/null 2>&1 || true
            docker rm cliproxy >/dev/null 2>&1 || true
          fi
          docker network rm dtf-inference >/dev/null 2>&1 || true
          rm -f cliproxy.config.yaml

      - name: Normalize CLIProxy auth state ownership
        if: always() && steps.restore_cliproxy_auth.outputs.auth_ready == 'true'
        shell: bash
        run: |
          set -euo pipefail
          if [[ -d cliproxy-auth ]]; then
            if command -v sudo >/dev/null 2>&1; then
              sudo chown -R "$(id -u):$(id -g)" cliproxy-auth
            else
              chown -R "$(id -u):$(id -g)" cliproxy-auth
            fi
          fi

      - name: Encrypt CLIProxy auth state
        id: encrypt_cliproxy_auth_cache
        if: always() && steps.restore_cliproxy_auth.outputs.auth_ready == 'true'
        shell: bash
        env:
          CLIPROXY_AUTH_TGZ_B64: ${{ secrets.CLIPROXY_AUTH_TGZ_B64 }}
        run: |
          set -euo pipefail
          umask 077
          plaintext_archive=cliproxy-auth.tgz
          cleanup() {
            rm -rf cliproxy-auth "$plaintext_archive"
          }
          trap cleanup EXIT
          if [[ ! -d cliproxy-auth ]]; then
            echo "CLIProxy auth state is unavailable" >&2
            exit 2
          fi
          if [[ -z "${CLIPROXY_AUTH_TGZ_B64:-}" ]]; then
            echo "CLIPROXY_AUTH_TGZ_B64 secret is required to preserve CLIProxy auth" >&2
            exit 2
          fi
          mkdir -p .cliproxy-auth-cache
          rm -f "$plaintext_archive" .cliproxy-auth-cache/cliproxy-auth.tgz.enc
          tar -czf "$plaintext_archive" -C cliproxy-auth .
          scripts/codex-auth-cache encrypt "$plaintext_archive" .cliproxy-auth-cache/cliproxy-auth.tgz.enc
          echo "cache_ready=true" >> "$GITHUB_OUTPUT"
          echo "cliproxy_auth_cache=encrypted"

      - name: Remove plaintext CLIProxy auth state
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          rm -rf cliproxy-auth cliproxy-auth.tgz

      - name: Save encrypted CLIProxy auth cache
        if: always() && steps.encrypt_cliproxy_auth_cache.outputs.cache_ready == 'true'
        uses: actions/cache/save@v4
        with:
          path: .cliproxy-auth-cache/cliproxy-auth.tgz.enc
          key: cliproxy-auth-cache-${{ github.repository_id }}-${{ github.ref_name }}-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Save defender state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .defender-state
          key: defender-state-${{ github.repository_id }}-${{ github.ref_name }}-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Save operator alert state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .operator-alert-state
          key: operator-alert-state-${{ github.repository_id }}-${{ github.ref_name }}-${{ github.run_id }}-${{ github.run_attempt }}

name: DTF Defender

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      once:
        description: Run one scan and exit; set false to keep polling for run_hours
        required: false
        default: true
        type: boolean
      operator_image:
        description: Optional runtime image override; default is DTF_OPERATOR_IMAGE or the upstream stable image
        required: false
        default: ''
        type: string
      run_hours:
        description: Optional RUN_HOURS override when once=false
        required: false
        default: ''
        type: string
      poll_seconds:
        description: Optional POLL_SECONDS override when once=false
        required: false
        default: ''
        type: string
      proposal_from_block:
        description: Optional ProposalCreated scan start block for targeted veto runs
        required: false
        default: ''
        type: string
      proposal_log_chunk_blocks:
        description: Optional ProposalCreated log chunk size for RPC providers with small eth_getLogs limits
        required: false
        default: ''
        type: string
      proposal_log_chunk_delay_ms:
        description: Optional delay between ProposalCreated log chunks, in milliseconds
        required: false
        default: ''
        type: string

permissions:
  contents: read
  actions: write
  packages: read

env:
  DTF_OPERATOR_IMAGE: ${{ vars.DTF_OPERATOR_IMAGE || 'ghcr.io/reserve-protocol/dtf-operator:stable' }}

jobs:
  defender:
    if: ${{ github.repository != 'reserve-protocol/dtf-operator-template' && vars.DTF_ACTIONS_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    concurrency:
      group: dtf-codex-auth-${{ github.repository_id }}
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore defender state
        uses: actions/cache/restore@v4
        with:
          path: .defender-state
          key: defender-state-${{ github.repository_id }}-${{ github.ref_name }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            defender-state-${{ github.repository_id }}-${{ github.ref_name }}-
            defender-state-${{ github.repository_id }}-

      - name: Restore operator alert state
        uses: actions/cache/restore@v4
        with:
          path: .operator-alert-state
          key: operator-alert-state-${{ github.repository_id }}-${{ github.ref_name }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            operator-alert-state-${{ github.repository_id }}-${{ github.ref_name }}-
            operator-alert-state-${{ github.repository_id }}-

      - name: Restore Codex auth cache
        uses: actions/cache/restore@v4
        with:
          path: .codex-auth-cache/auth.json.enc
          key: codex-auth-cache-${{ github.repository_id }}-${{ vars.CODEX_AUTH_CACHE_VERSION || 'v1' }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            codex-auth-cache-${{ github.repository_id }}-${{ vars.CODEX_AUTH_CACHE_VERSION || 'v1' }}-

      - name: Decrypt Codex auth cache
        shell: bash
        env:
          CODEX_AUTH_CACHE_KEY: ${{ secrets.CODEX_AUTH_CACHE_KEY }}
          CODEX_AUTH_JSON_B64: ${{ secrets.CODEX_AUTH_JSON_B64 }}
        run: |
          set -euo pipefail
          mkdir -p .codex-auth-cache
          if [[ -n "${CODEX_AUTH_JSON_B64:-}" && -z "${CODEX_AUTH_CACHE_KEY:-}" ]]; then
            echo "CODEX_AUTH_CACHE_KEY secret is required when CODEX_AUTH_JSON_B64 is configured" >&2
            exit 2
          fi
          if [[ ! -f .codex-auth-cache/auth.json.enc ]]; then
            echo "codex_auth_cache=miss"
            exit 0
          fi
          if scripts/codex-auth-cache decrypt .codex-auth-cache/auth.json.enc .codex-auth-cache/auth.json; then
            echo "codex_auth_cache=restored"
          elif [[ -n "${CODEX_AUTH_JSON_B64:-}" ]]; then
            echo "codex_auth_cache=decrypt_failed_bootstrap"
            rm -f .codex-auth-cache/auth.json .codex-auth-cache/auth.json.enc
          else
            echo "failed to decrypt cached Codex auth and CODEX_AUTH_JSON_B64 is unavailable" >&2
            exit 2
          fi

      - name: Resolve operator image
        shell: bash
        run: |
          set -euo pipefail
          operator_image="$OPERATOR_IMAGE_INPUT"
          if [[ -n "$operator_image" ]]; then
            if [[ ! "$operator_image" =~ ^[A-Za-z0-9._/@:-]+$ ]]; then
              echo "operator_image contains unsupported characters" >&2
              exit 2
            fi
            printf 'DTF_OPERATOR_IMAGE=%s\n' "$operator_image" >> "$GITHUB_ENV"
          fi
          echo "operator_image=${operator_image:-$DTF_OPERATOR_IMAGE}"
        env:
          OPERATOR_IMAGE_INPUT: ${{ inputs.operator_image }}

      - name: Pull operator image
        shell: bash
        run: |
          set -euo pipefail
          if docker pull "$DTF_OPERATOR_IMAGE"; then
            exit 0
          fi
          echo "docker pull failed for $DTF_OPERATOR_IMAGE" >&2
          echo "The default runtime image is public. If you overrode DTF_OPERATOR_IMAGE, set it to a readable linux/amd64 image." >&2
          exit 2

      - name: Verify operator image platform
        shell: bash
        run: |
          set -euo pipefail
          platform="$(docker image inspect "$DTF_OPERATOR_IMAGE" --format '{{.Os}}/{{.Architecture}}')"
          echo "operator_image=$DTF_OPERATOR_IMAGE"
          echo "operator_image_platform=$platform"
          if [[ "$platform" != "linux/amd64" ]]; then
            echo "DTF_OPERATOR_IMAGE must resolve to linux/amd64 on GitHub ubuntu runners; got $platform" >&2
            exit 2
          fi

      - name: Run defender
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .defender-state .operator-alert-state .codex-auth-cache
          if [[ -f .codex-auth-cache/auth.json ]]; then
            CODEX_AUTH_JSON_B64="$(base64 -w0 .codex-auth-cache/auth.json)"
            export CODEX_AUTH_JSON_B64
            echo "codex_auth_source=cache"
          elif [[ -n "${CODEX_AUTH_JSON_B64:-}" ]]; then
            echo "codex_auth_source=seed_secret"
          else
            echo "codex_auth_source=unset"
          fi
          docker run --rm \
            -e DTF_OPERATOR_CONFIG=/config/dtf-operator.yml \
            -e RUNTIME_DIR=/runtime \
            -e OUT_ROOT=/data \
            -e CODEX_ALERT_STATE_DIR=/alert-state \
            -e ONCE_INPUT \
            -e RUN_HOURS_INPUT \
            -e POLL_SECONDS_INPUT \
            -e PROPOSAL_FROM_BLOCK_INPUT \
            -e DEFENDER_PROPOSAL_LOG_CHUNK_BLOCKS \
            -e DEFENDER_PROPOSAL_LOG_CHUNK_DELAY_MS \
            -e CODEX_AUTH_JSON_B64 \
            -e CODEX_AUTH_ALERT_COOLDOWN_SECONDS \
            -e PROPOSER_KEYSTORE_JSON_B64 \
            -e PROPOSER_KEYSTORE_PASSWORD \
            -e DEFENDER_KEYSTORE_JSON_B64 \
            -e DEFENDER_KEYSTORE_PASSWORD \
            -e DEFENDER_FOUNDRY_ACCOUNT \
            -e RESEND_API_KEY \
            -e DEFENDER_EMAIL_TO \
            -e DEFENDER_EMAIL_FROM \
            -e FOUNDRY_ACCOUNT \
            -e RPC_URL \
            -e MAINNET_RPC_URL \
            -e BSC_RPC_URL \
            -e BASE_RPC_URL \
            -e GITHUB_SERVER_URL \
            -e GITHUB_REPOSITORY \
            -e GITHUB_RUN_ID \
            -e GITHUB_EVENT_NAME \
            -v "$PWD/.github/dtf-operator.yml:/config/dtf-operator.yml:ro" \
            -v "$PWD/.defender-state:/data" \
            -v "$PWD/.operator-alert-state:/alert-state" \
            -v "$PWD/.codex-auth-cache:/runtime/codex" \
            "$DTF_OPERATOR_IMAGE" \
            node dist/cli/run-github-defender.js
        env:
          CODEX_AUTH_JSON_B64: ${{ secrets.CODEX_AUTH_JSON_B64 }}
          CODEX_AUTH_ALERT_COOLDOWN_SECONDS: ${{ vars.CODEX_AUTH_ALERT_COOLDOWN_SECONDS }}
          PROPOSER_KEYSTORE_JSON_B64: ${{ secrets.PROPOSER_KEYSTORE_JSON_B64 }}
          PROPOSER_KEYSTORE_PASSWORD: ${{ secrets.PROPOSER_KEYSTORE_PASSWORD }}
          DEFENDER_KEYSTORE_JSON_B64: ${{ secrets.DEFENDER_KEYSTORE_JSON_B64 }}
          DEFENDER_KEYSTORE_PASSWORD: ${{ secrets.DEFENDER_KEYSTORE_PASSWORD }}
          DEFENDER_FOUNDRY_ACCOUNT: ${{ secrets.DEFENDER_FOUNDRY_ACCOUNT || vars.DEFENDER_FOUNDRY_ACCOUNT }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          DEFENDER_EMAIL_TO: ${{ secrets.DEFENDER_EMAIL_TO }}
          DEFENDER_EMAIL_FROM: ${{ secrets.DEFENDER_EMAIL_FROM || vars.DEFENDER_EMAIL_FROM }}
          FOUNDRY_ACCOUNT: ${{ secrets.DEFENDER_FOUNDRY_ACCOUNT || vars.DEFENDER_FOUNDRY_ACCOUNT || secrets.FOUNDRY_ACCOUNT }}
          RPC_URL: ${{ secrets.RPC_URL || vars.RPC_URL }}
          MAINNET_RPC_URL: ${{ secrets.MAINNET_RPC_URL || vars.MAINNET_RPC_URL }}
          BSC_RPC_URL: ${{ secrets.BSC_RPC_URL || vars.BSC_RPC_URL }}
          BASE_RPC_URL: ${{ secrets.BASE_RPC_URL || vars.BASE_RPC_URL }}
          ONCE_INPUT: ${{ inputs.once }}
          RUN_HOURS_INPUT: ${{ inputs.run_hours }}
          POLL_SECONDS_INPUT: ${{ inputs.poll_seconds }}
          PROPOSAL_FROM_BLOCK_INPUT: ${{ inputs.proposal_from_block }}
          DEFENDER_PROPOSAL_LOG_CHUNK_BLOCKS: ${{ inputs.proposal_log_chunk_blocks || vars.DEFENDER_PROPOSAL_LOG_CHUNK_BLOCKS }}
          DEFENDER_PROPOSAL_LOG_CHUNK_DELAY_MS: ${{ inputs.proposal_log_chunk_delay_ms || vars.DEFENDER_PROPOSAL_LOG_CHUNK_DELAY_MS }}

      - name: Normalize Codex auth cache ownership
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [[ -d .codex-auth-cache ]]; then
            if command -v sudo >/dev/null 2>&1; then
              sudo chown -R "$(id -u):$(id -g)" .codex-auth-cache
            else
              chown -R "$(id -u):$(id -g)" .codex-auth-cache
            fi
          fi

      - name: Encrypt Codex auth cache
        id: encrypt_codex_auth_cache
        if: always()
        shell: bash
        env:
          CODEX_AUTH_CACHE_KEY: ${{ secrets.CODEX_AUTH_CACHE_KEY }}
        run: |
          set -euo pipefail
          mkdir -p .codex-auth-cache
          if [[ ! -s .codex-auth-cache/auth.json ]]; then
            echo "cache_ready=false" >> "$GITHUB_OUTPUT"
            echo "codex_auth_cache=empty"
            exit 0
          fi
          if [[ -z "${CODEX_AUTH_CACHE_KEY:-}" ]]; then
            echo "CODEX_AUTH_CACHE_KEY secret is required to preserve refreshed Codex auth" >&2
            exit 2
          fi
          scripts/codex-auth-cache encrypt .codex-auth-cache/auth.json .codex-auth-cache/auth.json.enc
          rm -f .codex-auth-cache/auth.json
          echo "cache_ready=true" >> "$GITHUB_OUTPUT"
          echo "codex_auth_cache=encrypted"

      - name: Remove plaintext Codex auth cache
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          rm -f .codex-auth-cache/auth.json

      - name: Save Codex auth cache
        if: always() && steps.encrypt_codex_auth_cache.outputs.cache_ready == 'true'
        uses: actions/cache/save@v4
        with:
          path: .codex-auth-cache/auth.json.enc
          key: codex-auth-cache-${{ github.repository_id }}-${{ vars.CODEX_AUTH_CACHE_VERSION || 'v1' }}-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Save defender state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .defender-state
          key: defender-state-${{ github.repository_id }}-${{ github.ref_name }}-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Save operator alert state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .operator-alert-state
          key: operator-alert-state-${{ github.repository_id }}-${{ github.ref_name }}-${{ github.run_id }}-${{ github.run_attempt }}

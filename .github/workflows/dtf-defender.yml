name: DTF Defender

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      once:
        description: Run one scan and exit
        required: false
        default: true
        type: boolean
      run_hours:
        description: Optional RUN_HOURS override when once=false
        required: false
        default: ''
        type: string
      poll_seconds:
        description: Optional POLL_SECONDS override when once=false
        required: false
        default: ''
        type: string
      proposal_from_block:
        description: Optional ProposalCreated deployment floor for targeted recovery
        required: false
        default: ''
        type: string
      proposal_id:
        description: Optional exact proposal ID for durable veto recovery
        required: false
        default: ''
        type: string
      proposal_log_chunk_blocks:
        description: Optional ProposalCreated log chunk size
        required: false
        default: ''
        type: string
      proposal_log_chunk_delay_ms:
        description: Optional delay between ProposalCreated log chunks, in milliseconds
        required: false
        default: ''
        type: string

permissions:
  contents: read
  packages: read

env:
  # This disposable live-test branch builds the exact reviewed source commit locally.
  DTF_OPERATOR_IMAGE: dtf-operator-live-test:85c95f7
  CLI_PROXY_IMAGE: ${{ vars.CLI_PROXY_IMAGE || 'eceasy/cli-proxy-api@sha256:2d402a3edfbfa0612d7694345f7a05008fe8ce1915fde00ec9adb82afeb370c9' }}

jobs:
  bootstrap:
    if: ${{ github.repository == 'tbrent/dtf-operator-template' && github.event_name == 'workflow_dispatch' && github.ref_name == 'test/gitstore-live-d45e' && inputs.proposal_from_block == 'bootstrap' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout reviewed operator source
        uses: actions/checkout@v4
        with:
          repository: tbrent/dtf-operator
          ref: 85c95f78a0b8afebae83473a32c4069a61c42b7e
          path: operator-src
          token: ${{ secrets.OPERATOR_STATE_GIT_TOKEN }}

      - name: Build reviewed operator image
        shell: bash
        run: |
          set -euo pipefail
          [[ "$(git -C operator-src rev-parse HEAD)" == '85c95f78a0b8afebae83473a32c4069a61c42b7e' ]]
          docker build --target runtime -t "$DTF_OPERATOR_IMAGE" operator-src

      - name: Bootstrap isolated persistence and signer funding
        shell: bash
        env:
          BASE_RPC_URL: ${{ secrets.BASE_RPC_URL }}
          DEFENDER_KEYSTORE_JSON_B64: ${{ secrets.DEFENDER_KEYSTORE_JSON_B64 }}
          DEFENDER_KEYSTORE_PASSWORD: ${{ secrets.DEFENDER_KEYSTORE_PASSWORD }}
          DEFENDER_FOUNDRY_ACCOUNT: ${{ secrets.DEFENDER_FOUNDRY_ACCOUNT }}
          PROPOSER_SIGNER_ADDRESS: ${{ vars.PROPOSER_SIGNER_ADDRESS }}
          FUND_PROPOSER_WEI: '0'
          CLIPROXY_AUTH_TGZ_B64: ${{ secrets.CLIPROXY_AUTH_TGZ_B64 }}
          CLIPROXY_SECOND_AUTH_TGZ_B64: ${{ secrets.CLIPROXY_SECOND_AUTH_TGZ_B64 }}
          ALLOW_SHARED_CPA_LOGIN_FOR_SEQUENTIAL_SMOKE: '1'
          CPA_PROPOSER_GITSTORE_URL: ${{ vars.CPA_PROPOSER_GITSTORE_URL }}
          CPA_PROPOSER_GITSTORE_BRANCH: ${{ vars.CPA_PROPOSER_GITSTORE_BRANCH }}
          CPA_PROPOSER_GITSTORE_TOKEN: ${{ secrets.CPA_PROPOSER_GITSTORE_TOKEN }}
          CPA_DEFENDER_GITSTORE_URL: ${{ vars.CPA_DEFENDER_GITSTORE_URL }}
          CPA_DEFENDER_GITSTORE_BRANCH: ${{ vars.CPA_DEFENDER_GITSTORE_BRANCH }}
          CPA_DEFENDER_GITSTORE_TOKEN: ${{ secrets.CPA_DEFENDER_GITSTORE_TOKEN }}
          CPA_GITSTORE_GIT_USERNAME: ${{ vars.CPA_GITSTORE_GIT_USERNAME }}
          OPERATOR_STATE_GIT_URL: ${{ vars.OPERATOR_STATE_GIT_URL }}
          OPERATOR_STATE_GIT_BRANCH: ${{ vars.OPERATOR_STATE_GIT_BRANCH }}
          OPERATOR_STATE_GIT_TOKEN: ${{ secrets.OPERATOR_STATE_GIT_TOKEN }}
        run: scripts/live-test-bootstrap

  defender:
    if: ${{ github.repository == 'tbrent/dtf-operator-template' && github.event_name == 'workflow_dispatch' && github.ref_name == 'test/gitstore-live-d45e' && inputs.proposal_from_block != 'bootstrap' && vars.OPERATOR_AUTHORITY_MODE == 'git-authoritative' }}
    runs-on: ubuntu-latest
    # This disposable smoke branch shares one CPA login across distinct stores,
    # so Proposer and Defender must use the same serialization domain.
    concurrency:
      group: dtf-live-test-shared-cpa-${{ github.repository_id }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Checkout reviewed operator source
        uses: actions/checkout@v4
        with:
          repository: tbrent/dtf-operator
          ref: 85c95f78a0b8afebae83473a32c4069a61c42b7e
          path: operator-src
          token: ${{ secrets.OPERATOR_STATE_GIT_TOKEN }}

      - name: Build reviewed operator image
        shell: bash
        run: |
          set -euo pipefail
          [[ "$(git -C operator-src rev-parse HEAD)" == '85c95f78a0b8afebae83473a32c4069a61c42b7e' ]]
          docker build --target runtime -t "$DTF_OPERATOR_IMAGE" operator-src

      - name: Assert authoritative cutover inputs
        shell: bash
        env:
          OPERATOR_STATE_GIT_URL: ${{ vars.OPERATOR_STATE_GIT_URL }}
          OPERATOR_STATE_GIT_BRANCH: ${{ vars.OPERATOR_STATE_GIT_BRANCH }}
          OPERATOR_STATE_GIT_TOKEN: ${{ secrets.OPERATOR_STATE_GIT_TOKEN }}
          CPA_GITSTORE_URL: ${{ vars.CPA_DEFENDER_GITSTORE_URL }}
          CPA_GITSTORE_BRANCH: ${{ vars.CPA_DEFENDER_GITSTORE_BRANCH }}
          CPA_GITSTORE_TOKEN: ${{ secrets.CPA_DEFENDER_GITSTORE_TOKEN }}
          CPA_OTHER_GITSTORE_URL: ${{ vars.CPA_PROPOSER_GITSTORE_URL }}
          CPA_OTHER_GITSTORE_BRANCH: ${{ vars.CPA_PROPOSER_GITSTORE_BRANCH }}
          INFERENCE_API_KEY: ${{ secrets.INFERENCE_API_KEY }}
          CPA_OAUTH_ISOLATION: ${{ vars.CPA_OAUTH_ISOLATION }}
          PROPOSER_SIGNER_ADDRESS: ${{ vars.PROPOSER_SIGNER_ADDRESS }}
          DEFENDER_SIGNER_ADDRESS: ${{ vars.DEFENDER_SIGNER_ADDRESS }}
          DEFENDER_KEYSTORE_JSON_B64: ${{ secrets.DEFENDER_KEYSTORE_JSON_B64 }}
          DEFENDER_KEYSTORE_PASSWORD: ${{ secrets.DEFENDER_KEYSTORE_PASSWORD }}
          DEFENDER_FOUNDRY_ACCOUNT: ${{ secrets.DEFENDER_FOUNDRY_ACCOUNT || vars.DEFENDER_FOUNDRY_ACCOUNT }}
        run: |
          set -euo pipefail
          [[ "$DTF_OPERATOR_IMAGE" == 'dtf-operator-live-test:85c95f7' ]] || { echo 'unexpected live-test operator image' >&2; exit 2; }
          [[ "$CLI_PROXY_IMAGE" == *@sha256:* ]] || { echo 'CLI_PROXY_IMAGE must be digest-pinned' >&2; exit 2; }
          for required in OPERATOR_STATE_GIT_URL OPERATOR_STATE_GIT_BRANCH OPERATOR_STATE_GIT_TOKEN CPA_GITSTORE_URL CPA_GITSTORE_BRANCH CPA_GITSTORE_TOKEN CPA_OTHER_GITSTORE_URL CPA_OTHER_GITSTORE_BRANCH INFERENCE_API_KEY DEFENDER_KEYSTORE_JSON_B64 DEFENDER_KEYSTORE_PASSWORD DEFENDER_FOUNDRY_ACCOUNT; do
            [[ -n "${!required:-}" ]] || { echo "$required is required for authoritative mode" >&2; exit 2; }
          done
          [[ "$CPA_GITSTORE_URL:$CPA_GITSTORE_BRANCH" != "$CPA_OTHER_GITSTORE_URL:$CPA_OTHER_GITSTORE_BRANCH" ]] || { echo 'Proposer and Defender CPA GitStore write domains must differ' >&2; exit 2; }
          [[ "$OPERATOR_STATE_GIT_URL:$OPERATOR_STATE_GIT_BRANCH" != "$CPA_GITSTORE_URL:$CPA_GITSTORE_BRANCH" && "$OPERATOR_STATE_GIT_URL:$OPERATOR_STATE_GIT_BRANCH" != "$CPA_OTHER_GITSTORE_URL:$CPA_OTHER_GITSTORE_BRANCH" ]] || { echo 'operator journal and CPA GitStore write domains must differ' >&2; exit 2; }
          [[ "$CPA_OAUTH_ISOLATION" == 'shared-login-sequential-smoke' ]] || { echo 'this test branch requires the explicit shared-login sequential-smoke marker' >&2; exit 2; }
          [[ "$PROPOSER_SIGNER_ADDRESS" =~ ^0x[0-9a-fA-F]{40}$ && "$DEFENDER_SIGNER_ADDRESS" =~ ^0x[0-9a-fA-F]{40}$ ]] || { echo 'PROPOSER_SIGNER_ADDRESS and DEFENDER_SIGNER_ADDRESS must be EVM addresses' >&2; exit 2; }
          [[ "${PROPOSER_SIGNER_ADDRESS,,}" != "${DEFENDER_SIGNER_ADDRESS,,}" ]] || { echo 'authoritative parallel scheduling requires distinct proposer and defender signer addresses' >&2; exit 2; }

      - name: Verify locally built journal-compatible operator image
        shell: bash
        run: |
          set -euo pipefail
          [[ "$(docker image inspect "$DTF_OPERATOR_IMAGE" --format '{{.Os}}/{{.Architecture}}')" == linux/amd64 ]]

      - name: Start GitStore-backed CLIProxyAPI
        shell: bash
        env:
          GITSTORE_GIT_URL: ${{ vars.CPA_DEFENDER_GITSTORE_URL }}
          GITSTORE_GIT_BRANCH: ${{ vars.CPA_DEFENDER_GITSTORE_BRANCH }}
          GITSTORE_GIT_TOKEN: ${{ secrets.CPA_DEFENDER_GITSTORE_TOKEN }}
          GITSTORE_GIT_USERNAME: ${{ vars.CPA_GITSTORE_GIT_USERNAME }}
          MANAGEMENT_PASSWORD: ${{ secrets.INFERENCE_API_KEY }}
        run: |
          set -euo pipefail
          mkdir -m 700 -p cliproxy-gitstore
          docker network create dtf-inference >/dev/null 2>&1 || true
          docker run -d --name cliproxy --network dtf-inference -p 127.0.0.1:8317:8317 \
            -e GITSTORE_GIT_URL -e GITSTORE_GIT_BRANCH -e GITSTORE_GIT_TOKEN -e GITSTORE_GIT_USERNAME \
            -e MANAGEMENT_PASSWORD -e GITSTORE_LOCAL_PATH=/state \
            -v "$PWD/cliproxy-gitstore:/state" "$CLI_PROXY_IMAGE" /CLIProxyAPI/CLIProxyAPI
          for _ in {1..60}; do
            curl -sf -H "Authorization: Bearer $MANAGEMENT_PASSWORD" http://127.0.0.1:8317/v1/models >/dev/null && exit 0
            sleep 1
          done
          echo 'CLIProxyAPI did not become ready; inspect the private GitStore and sidecar logs outside this credential-bearing workflow' >&2
          exit 2

      - name: Verify GitStore OAuth state
        shell: bash
        env:
          INFERENCE_API_KEY: ${{ secrets.INFERENCE_API_KEY }}
        run: |
          set -euo pipefail
          auth_files="$(curl -fsS -H "Authorization: Bearer $INFERENCE_API_KEY" http://127.0.0.1:8317/v0/management/auth-files)"
          [[ "$auth_files" != *'"files":[]'* ]] || { echo 'GitStore contains no OAuth records' >&2; exit 2; }

      - name: Smoke test GitStore-backed OAuth inference
        shell: bash
        env:
          INFERENCE_API_KEY: ${{ secrets.INFERENCE_API_KEY }}
        run: |
          set -euo pipefail
          response="$(curl -fsS -H "Authorization: Bearer $INFERENCE_API_KEY" -H 'Content-Type: application/json' \
            --data '{"model":"gpt-5.5","messages":[{"role":"user","content":"Reply with exactly OK."}],"stream":false}' \
            http://127.0.0.1:8317/v1/chat/completions)"
          jq -e '.choices | type == "array" and length > 0' <<<"$response" >/dev/null

      - name: Run defender
        shell: bash
        env:
          INFERENCE_API_KEY: ${{ secrets.INFERENCE_API_KEY }}
          RPC_URL: ${{ secrets.RPC_URL || vars.RPC_URL }}
          MAINNET_RPC_URL: ${{ secrets.MAINNET_RPC_URL || vars.MAINNET_RPC_URL }}
          BSC_RPC_URL: ${{ secrets.BSC_RPC_URL || vars.BSC_RPC_URL }}
          BASE_RPC_URL: ${{ secrets.BASE_RPC_URL || vars.BASE_RPC_URL }}
          DEFENDER_KEYSTORE_JSON_B64: ${{ secrets.DEFENDER_KEYSTORE_JSON_B64 }}
          DEFENDER_KEYSTORE_PASSWORD: ${{ secrets.DEFENDER_KEYSTORE_PASSWORD }}
          DEFENDER_FOUNDRY_ACCOUNT: ${{ secrets.DEFENDER_FOUNDRY_ACCOUNT || vars.DEFENDER_FOUNDRY_ACCOUNT }}
          DEFENDER_SIGNER_ADDRESS: ${{ vars.DEFENDER_SIGNER_ADDRESS }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          DEFENDER_EMAIL_TO: ${{ secrets.DEFENDER_EMAIL_TO || vars.DEFENDER_EMAIL_TO }}
          DEFENDER_EMAIL_FROM: ${{ secrets.DEFENDER_EMAIL_FROM || vars.DEFENDER_EMAIL_FROM }}
          INFERENCE_AUTH_ALERT_COOLDOWN_SECONDS: ${{ vars.INFERENCE_AUTH_ALERT_COOLDOWN_SECONDS }}
          ONCE_INPUT: ${{ inputs.once }}
          RUN_HOURS_INPUT: ${{ inputs.run_hours }}
          POLL_SECONDS_INPUT: ${{ inputs.poll_seconds }}
          PROPOSAL_FROM_BLOCK_INPUT: ${{ inputs.proposal_from_block }}
          PROPOSAL_ID: ${{ inputs.proposal_id }}
          DEFENDER_PROPOSAL_LOG_CHUNK_BLOCKS: ${{ inputs.proposal_log_chunk_blocks || vars.DEFENDER_PROPOSAL_LOG_CHUNK_BLOCKS }}
          DEFENDER_PROPOSAL_LOG_CHUNK_DELAY_MS: ${{ inputs.proposal_log_chunk_delay_ms || vars.DEFENDER_PROPOSAL_LOG_CHUNK_DELAY_MS }}
          OPERATOR_STATE_GIT_URL: ${{ vars.OPERATOR_STATE_GIT_URL }}
          OPERATOR_STATE_GIT_BRANCH: ${{ vars.OPERATOR_STATE_GIT_BRANCH }}
          OPERATOR_STATE_GIT_TOKEN: ${{ secrets.OPERATOR_STATE_GIT_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p defender-data
          docker run --rm --network dtf-inference \
            -e DTF_OPERATOR_CONFIG=/config/dtf-operator.yml -e OUT_ROOT=/data \
            -e INFERENCE_BASE_URL=http://cliproxy:8317/v1 -e INFERENCE_API_KEY \
            -e RPC_URL -e MAINNET_RPC_URL -e BSC_RPC_URL -e BASE_RPC_URL \
            -e DEFENDER_KEYSTORE_JSON_B64 -e DEFENDER_KEYSTORE_PASSWORD -e DEFENDER_FOUNDRY_ACCOUNT -e DEFENDER_SIGNER_ADDRESS \
            -e RESEND_API_KEY -e DEFENDER_EMAIL_TO -e DEFENDER_EMAIL_FROM -e INFERENCE_AUTH_ALERT_COOLDOWN_SECONDS \
            -e ONCE_INPUT -e RUN_HOURS_INPUT -e POLL_SECONDS_INPUT -e PROPOSAL_FROM_BLOCK_INPUT -e PROPOSAL_ID \
            -e DEFENDER_PROPOSAL_LOG_CHUNK_BLOCKS -e DEFENDER_PROPOSAL_LOG_CHUNK_DELAY_MS \
            -e GITHUB_SERVER_URL -e GITHUB_REPOSITORY -e GITHUB_EVENT_NAME -e GITHUB_RUN_ID -e GITHUB_RUN_ATTEMPT \
            -e OPERATOR_STATE_GIT_URL -e OPERATOR_STATE_GIT_BRANCH -e OPERATOR_STATE_GIT_TOKEN \
            -e OPERATOR_STATE_MODE=git-authoritative \
            -v "$PWD/.github/dtf-operator.yml:/config/dtf-operator.yml:ro" -v "$PWD/defender-data:/data" \
            "$DTF_OPERATOR_IMAGE" node dist/cli/run-github-defender.js

      - name: Stop sidecar and remove local copies
        if: always()
        shell: bash
        run: |
          docker stop --time 15 cliproxy >/dev/null 2>&1 || true
          docker rm -f cliproxy >/dev/null 2>&1 || true
          docker network rm dtf-inference >/dev/null 2>&1 || true
          docker run --rm --entrypoint sh -v "$PWD/cliproxy-gitstore:/state" "$CLI_PROXY_IMAGE" \
            -c 'chmod -R a+rwX /state' >/dev/null 2>&1 || true
          rm -rf cliproxy-gitstore

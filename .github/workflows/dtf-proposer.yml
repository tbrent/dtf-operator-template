name: DTF Proposer

on:
  schedule:
    - cron: '7 * * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: Safe proposer mode to run
        required: true
        default: dry-run
        type: choice
        options:
          - dry-run
          - observe-only
          - live-one-cycle
      run_hours:
        description: Optional RUN_HOURS override for this manual dispatch
        required: false
        default: ''
        type: string
      min_open_auction_value_usd:
        description: Optional minimum residual auction value to open, in USD
        required: false
        default: ''
        type: string
      cowbot_min_value_usd:
        description: Optional CowBot minimum bid value, in USD
        required: false
        default: ''
        type: string
      confirm_live_broadcast:
        description: Confirm manual live mode may broadcast proposer, execute, and openAuction transactions
        required: false
        default: false
        type: boolean
      allow_public_rpc:
        description: Allow known public fallback RPCs for observe-only operation
        required: false
        default: false
        type: boolean
      rpc_url_override:
        description: Optional RPC URL for this dispatch only
        required: false
        default: ''
        type: string
      confirm_bypass_proposer_defender_check:
        description: Type BYPASS_PROPOSER_DEFENDER_CHECK to bypass the self-check in live mode
        required: false
        default: ''
        type: string

permissions:
  contents: read
  packages: read

env:
  DTF_OPERATOR_IMAGE: ghcr.io/reserve-protocol/dtf-operator@sha256:154b3e62e5ff99fe33961cbba64c7aa83bee129fafe81fe500d6cbb0594db61c
  DTF_OPERATOR_SOURCE_REVISION: 4f7cff1648552c679ee5b22bb5a35fbcb26cc5f1
  CLI_PROXY_IMAGE: eceasy/cli-proxy-api@sha256:2d402a3edfbfa0612d7694345f7a05008fe8ce1915fde00ec9adb82afeb370c9

jobs:
  proposer:
    if: ${{ github.repository != 'reserve-protocol/dtf-operator-template' && (github.event_name == 'workflow_dispatch' || vars.DTF_SCHEDULES_ENABLED == 'true') }}
    runs-on: ubuntu-latest
    concurrency:
      group: dtf-proposer-${{ github.repository_id }}
      cancel-in-progress: false

    steps:
      - name: Checkout operator configuration
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Assert production isolation
        shell: bash
        env:
          CPA_PROPOSER_GITSTORE_URL: ${{ vars.CPA_PROPOSER_GITSTORE_URL }}
          CPA_PROPOSER_GITSTORE_BRANCH: ${{ vars.CPA_PROPOSER_GITSTORE_BRANCH }}
          CPA_PROPOSER_GITSTORE_TOKEN: ${{ secrets.CPA_PROPOSER_GITSTORE_TOKEN }}
          CPA_DEFENDER_GITSTORE_URL: ${{ vars.CPA_DEFENDER_GITSTORE_URL }}
          CPA_DEFENDER_GITSTORE_BRANCH: ${{ vars.CPA_DEFENDER_GITSTORE_BRANCH }}
          OPERATOR_STATE_GIT_BRANCH: ${{ vars.OPERATOR_STATE_GIT_BRANCH }}
          CPA_PROPOSER_OAUTH_IDENTITY: ${{ vars.CPA_PROPOSER_OAUTH_IDENTITY }}
          CPA_DEFENDER_OAUTH_IDENTITY: ${{ vars.CPA_DEFENDER_OAUTH_IDENTITY }}
          CPA_PROPOSER_OAUTH_FINGERPRINT: ${{ secrets.CPA_PROPOSER_OAUTH_FINGERPRINT }}
          CPA_DEFENDER_OAUTH_FINGERPRINT: ${{ secrets.CPA_DEFENDER_OAUTH_FINGERPRINT }}
          CPA_OAUTH_ISOLATION: ${{ vars.CPA_OAUTH_ISOLATION }}
          PROPOSER_SIGNER_ADDRESS: ${{ vars.PROPOSER_SIGNER_ADDRESS }}
          DEFENDER_SIGNER_ADDRESS: ${{ vars.DEFENDER_SIGNER_ADDRESS }}
          PROPOSER_INFERENCE_API_KEY: ${{ secrets.PROPOSER_INFERENCE_API_KEY }}
        run: |
          set -euo pipefail
          for required in \
            CPA_PROPOSER_GITSTORE_URL CPA_PROPOSER_GITSTORE_BRANCH CPA_PROPOSER_GITSTORE_TOKEN \
            CPA_DEFENDER_GITSTORE_URL CPA_DEFENDER_GITSTORE_BRANCH \
            OPERATOR_STATE_GIT_BRANCH \
            CPA_PROPOSER_OAUTH_IDENTITY CPA_DEFENDER_OAUTH_IDENTITY \
            CPA_PROPOSER_OAUTH_FINGERPRINT CPA_DEFENDER_OAUTH_FINGERPRINT CPA_OAUTH_ISOLATION \
            PROPOSER_SIGNER_ADDRESS DEFENDER_SIGNER_ADDRESS PROPOSER_INFERENCE_API_KEY; do
            [[ -n "${!required:-}" ]] || { echo "$required is required" >&2; exit 2; }
          done
          [[ "$CPA_OAUTH_ISOLATION" == 'separate-gitstores-and-logins' ]] || { echo 'CPA_OAUTH_ISOLATION must confirm separate GitStores and OAuth logins' >&2; exit 2; }
          [[ "$CPA_PROPOSER_OAUTH_IDENTITY" =~ ^[A-Za-z0-9._@+-]+$ && "$CPA_DEFENDER_OAUTH_IDENTITY" =~ ^[A-Za-z0-9._@+-]+$ ]] || { echo 'CPA OAuth identity labels must use safe non-secret characters' >&2; exit 2; }
          [[ "${CPA_PROPOSER_OAUTH_IDENTITY,,}" != "${CPA_DEFENDER_OAUTH_IDENTITY,,}" ]] || { echo 'Proposer and Defender CPA OAuth identities must differ' >&2; exit 2; }
          [[ "$CPA_PROPOSER_OAUTH_FINGERPRINT" =~ ^[0-9a-f]{64}$ && "$CPA_DEFENDER_OAUTH_FINGERPRINT" =~ ^[0-9a-f]{64}$ ]] || { echo 'CPA OAuth identity fingerprints are invalid' >&2; exit 2; }
          [[ "$CPA_PROPOSER_OAUTH_FINGERPRINT" != "$CPA_DEFENDER_OAUTH_FINGERPRINT" ]] || { echo 'Proposer and Defender CPA OAuth account fingerprints must differ' >&2; exit 2; }
          for branch in "$CPA_PROPOSER_GITSTORE_BRANCH" "$CPA_DEFENDER_GITSTORE_BRANCH" "$OPERATOR_STATE_GIT_BRANCH"; do
            [[ "$branch" =~ ^[A-Za-z0-9][A-Za-z0-9._/-]*$ && "$branch" != *..* && "$branch" != */ && "$branch" != *//* ]] || { echo 'Git branch names must be safe' >&2; exit 2; }
          done
          proposer_repo="${CPA_PROPOSER_GITSTORE_URL,,}"
          proposer_repo="${proposer_repo%/}"
          proposer_repo="${proposer_repo%.git}"
          defender_repo="${CPA_DEFENDER_GITSTORE_URL,,}"
          defender_repo="${defender_repo%/}"
          defender_repo="${defender_repo%.git}"
          [[ "$proposer_repo" != "$defender_repo" ]] || { echo 'Proposer and Defender CPA GitStores must use different repositories' >&2; exit 2; }
          [[ "$CPA_DEFENDER_GITSTORE_BRANCH" != "$OPERATOR_STATE_GIT_BRANCH" ]] || { echo 'Defender CPA and journal branches must differ' >&2; exit 2; }
          proposer_domain="$proposer_repo#$CPA_PROPOSER_GITSTORE_BRANCH"
          defender_domain="$defender_repo#$CPA_DEFENDER_GITSTORE_BRANCH"
          journal_domain="$defender_repo#$OPERATOR_STATE_GIT_BRANCH"
          [[ "$proposer_domain" != "$defender_domain" && "$proposer_domain" != "$journal_domain" && "$defender_domain" != "$journal_domain" ]] || { echo 'Proposer CPA, Defender CPA, and Defender journal write domains must be pairwise distinct' >&2; exit 2; }
          for url in "$CPA_PROPOSER_GITSTORE_URL" "$CPA_DEFENDER_GITSTORE_URL"; do
            case "$url" in
              http://*@*|https://*@*) echo 'Git URLs must not contain credentials' >&2; exit 2 ;;
            esac
          done
          [[ "$PROPOSER_SIGNER_ADDRESS" =~ ^0x[0-9a-fA-F]{40}$ && "$DEFENDER_SIGNER_ADDRESS" =~ ^0x[0-9a-fA-F]{40}$ ]] || { echo 'Proposer and Defender signer variables must be EVM addresses' >&2; exit 2; }
          [[ "${PROPOSER_SIGNER_ADDRESS,,}" != "${DEFENDER_SIGNER_ADDRESS,,}" ]] || { echo 'Proposer and Defender signers must differ' >&2; exit 2; }

      - name: Pull and verify published operator
        id: pull_image
        shell: bash
        run: |
          set -euo pipefail
          expected_image='ghcr.io/reserve-protocol/dtf-operator@sha256:154b3e62e5ff99fe33961cbba64c7aa83bee129fafe81fe500d6cbb0594db61c'
          expected_revision='4f7cff1648552c679ee5b22bb5a35fbcb26cc5f1'
          [[ "$DTF_OPERATOR_IMAGE" == "$expected_image" ]] || { echo 'unexpected operator image' >&2; exit 2; }
          [[ "$DTF_OPERATOR_SOURCE_REVISION" == "$expected_revision" ]] || { echo 'unexpected operator source revision' >&2; exit 2; }
          docker pull --platform linux/amd64 "$DTF_OPERATOR_IMAGE"
          platform="$(docker image inspect "$DTF_OPERATOR_IMAGE" --format '{{.Os}}/{{.Architecture}}')"
          revision="$(docker image inspect "$DTF_OPERATOR_IMAGE" --format '{{ index .Config.Labels "org.opencontainers.image.revision" }}')"
          [[ "$platform" == 'linux/amd64' ]] || { echo "operator image must be linux/amd64; got $platform" >&2; exit 2; }
          [[ "$revision" == "$DTF_OPERATOR_SOURCE_REVISION" ]] || { echo 'operator OCI revision does not match the reviewed source revision' >&2; exit 2; }
          echo "operator_image=$DTF_OPERATOR_IMAGE"
          echo "operator_source_revision=$DTF_OPERATOR_SOURCE_REVISION"
          echo "operator_platform=$platform"

      - name: Start Proposer GitStore inference sidecar
        shell: bash
        env:
          GITSTORE_GIT_URL: ${{ vars.CPA_PROPOSER_GITSTORE_URL }}
          GITSTORE_GIT_BRANCH: ${{ vars.CPA_PROPOSER_GITSTORE_BRANCH }}
          GITSTORE_GIT_TOKEN: ${{ secrets.CPA_PROPOSER_GITSTORE_TOKEN }}
          GITSTORE_GIT_USERNAME: ${{ vars.CPA_GITSTORE_GIT_USERNAME }}
          MANAGEMENT_PASSWORD: ${{ secrets.PROPOSER_INFERENCE_API_KEY }}
        run: |
          set -euo pipefail
          repo_slug="${GITSTORE_GIT_URL#https://github.com/}"
          repo_slug="${repo_slug%.git}"
          api_status="$(curl -sS -o /dev/null -w '%{http_code}' \
            -H "Authorization: Bearer $GITSTORE_GIT_TOKEN" \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "https://api.github.com/repos/$repo_slug/branches/$GITSTORE_GIT_BRANCH" || true)"
          if [[ "$api_status" != 200 ]]; then
            echo "Proposer GitStore token branch check returned GitHub API HTTP $api_status" >&2
            exit 2
          fi
          askpass="$(mktemp)"
          trap 'rm -f "$askpass"' EXIT
          cat > "$askpass" <<'EOF'
          #!/usr/bin/env bash
          case "$1" in
            *Username*) printf '%s\n' "$GITSTORE_GIT_USERNAME" ;;
            *Password*) printf '%s\n' "$GITSTORE_GIT_TOKEN" ;;
            *) exit 1 ;;
          esac
          EOF
          chmod 700 "$askpass"
          if ! GIT_ASKPASS="$askpass" GIT_TERMINAL_PROMPT=0 git ls-remote --exit-code "$GITSTORE_GIT_URL" "refs/heads/$GITSTORE_GIT_BRANCH" >/dev/null 2>&1; then
            echo 'Proposer GitStore token cannot read the configured repository branch' >&2
            exit 2
          fi
          rm -f "$askpass"
          trap - EXIT
          mkdir -m 700 -p cliproxy-gitstore
          docker network create dtf-inference >/dev/null 2>&1 || true
          docker run -d \
            --name cliproxy \
            --network dtf-inference \
            -p 127.0.0.1:8317:8317 \
            -e GITSTORE_GIT_URL \
            -e GITSTORE_GIT_BRANCH \
            -e GITSTORE_GIT_TOKEN \
            -e GITSTORE_GIT_USERNAME \
            -e GITSTORE_LOCAL_PATH=/state \
            -e MANAGEMENT_PASSWORD \
            -v "$PWD/cliproxy-gitstore:/state" \
            "$CLI_PROXY_IMAGE" \
            /CLIProxyAPI/CLIProxyAPI
          for _ in {1..60}; do
            if curl -sf -H "Authorization: Bearer $MANAGEMENT_PASSWORD" http://127.0.0.1:8317/v0/management/auth-files >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          state="$(docker inspect cliproxy --format '{{.State.Status}} (exit {{.State.ExitCode}})' 2>/dev/null || printf 'missing')"
          echo "Proposer CLIProxyAPI did not become ready; container state: $state" >&2
          exit 2

      - name: Verify Proposer OAuth authority
        shell: bash
        env:
          MANAGEMENT_PASSWORD: ${{ secrets.PROPOSER_INFERENCE_API_KEY }}
        run: |
          set -euo pipefail
          auth_files="$(curl -fsS -H "Authorization: Bearer $MANAGEMENT_PASSWORD" http://127.0.0.1:8317/v0/management/auth-files)"
          [[ "$auth_files" != *'"files":[]'* ]] || { echo 'Proposer CPA GitStore contains no OAuth records' >&2; exit 2; }

      - name: Run proposer
        shell: bash
        env:
          INFERENCE_API_KEY: ${{ secrets.PROPOSER_INFERENCE_API_KEY }}
          RPC_URL: ${{ secrets.RPC_URL || vars.RPC_URL }}
          MAINNET_RPC_URL: ${{ secrets.MAINNET_RPC_URL || vars.MAINNET_RPC_URL }}
          BSC_RPC_URL: ${{ secrets.BSC_RPC_URL || vars.BSC_RPC_URL }}
          BASE_RPC_URL: ${{ secrets.BASE_RPC_URL || vars.BASE_RPC_URL }}
          ALLOW_SYNTHETIC_SIGNAL_STRATEGY_VAR: ${{ vars.ALLOW_SYNTHETIC_SIGNAL_STRATEGY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          DEFENDER_EMAIL_TO: ${{ secrets.DEFENDER_EMAIL_TO || vars.DEFENDER_EMAIL_TO }}
          DEFENDER_EMAIL_FROM: ${{ secrets.DEFENDER_EMAIL_FROM || vars.DEFENDER_EMAIL_FROM }}
          INFERENCE_AUTH_ALERT_COOLDOWN_SECONDS: ${{ vars.INFERENCE_AUTH_ALERT_COOLDOWN_SECONDS }}
          PROPOSER_KEYSTORE_JSON_B64: ${{ secrets.PROPOSER_KEYSTORE_JSON_B64 }}
          PROPOSER_KEYSTORE_PASSWORD: ${{ secrets.PROPOSER_KEYSTORE_PASSWORD }}
          FOUNDRY_ACCOUNT: ${{ secrets.PROPOSER_FOUNDRY_ACCOUNT }}
          SIGNER_ADDRESS: ${{ vars.PROPOSER_SIGNER_ADDRESS }}
          PROPOSER_SIGNER_ADDRESS: ${{ vars.PROPOSER_SIGNER_ADDRESS }}
          AUCTION_LAUNCHER_KEYSTORE_JSON_B64: ${{ secrets.AUCTION_LAUNCHER_KEYSTORE_JSON_B64 }}
          AUCTION_LAUNCHER_KEYSTORE_PASSWORD: ${{ secrets.AUCTION_LAUNCHER_KEYSTORE_PASSWORD }}
          AUCTION_LAUNCHER_FOUNDRY_ACCOUNT: ${{ secrets.AUCTION_LAUNCHER_FOUNDRY_ACCOUNT }}
          MIN_SIGNER_BALANCE_WEI: ${{ vars.MIN_SIGNER_BALANCE_WEI || '1' }}
          MODE_INPUT: ${{ inputs.mode || '' }}
          CONFIRM_LIVE_BROADCAST_INPUT: ${{ inputs.confirm_live_broadcast || false }}
          RUN_HOURS_INPUT: ${{ inputs.run_hours }}
          MIN_OPEN_AUCTION_VALUE_USD_INPUT: ${{ inputs.min_open_auction_value_usd }}
          COWBOT_MIN_VALUE_USD_INPUT: ${{ inputs.cowbot_min_value_usd }}
          ALLOW_PUBLIC_RPC_INPUT: ${{ inputs.allow_public_rpc || false }}
          RPC_URL_OVERRIDE_INPUT: ${{ inputs.rpc_url_override }}
          BYPASS_PROPOSER_DEFENDER_CHECK_INPUT: ${{ inputs.confirm_bypass_proposer_defender_check == 'BYPASS_PROPOSER_DEFENDER_CHECK' }}
          CONFIRM_BYPASS_PROPOSER_DEFENDER_CHECK_INPUT: ${{ inputs.confirm_bypass_proposer_defender_check }}
        run: |
          set -euo pipefail
          mkdir -p proposer-data
          docker run --rm \
            --platform linux/amd64 \
            --network dtf-inference \
            -e DTF_OPERATOR_CONFIG=/config/dtf-operator.yml \
            -e OUT_ROOT=/data \
            -e INFERENCE_BASE_URL=http://cliproxy:8317/v1 \
            -e INFERENCE_API_KEY \
            -e INFERENCE_AUTH_ALERT_COOLDOWN_SECONDS \
            -e RESEND_API_KEY \
            -e DEFENDER_EMAIL_TO \
            -e DEFENDER_EMAIL_FROM \
            -e RPC_URL \
            -e MAINNET_RPC_URL \
            -e BSC_RPC_URL \
            -e BASE_RPC_URL \
            -e ALLOW_SYNTHETIC_SIGNAL_STRATEGY_VAR \
            -e PROPOSER_KEYSTORE_JSON_B64 \
            -e PROPOSER_KEYSTORE_PASSWORD \
            -e FOUNDRY_ACCOUNT \
            -e SIGNER_ADDRESS \
            -e PROPOSER_SIGNER_ADDRESS \
            -e AUCTION_LAUNCHER_KEYSTORE_JSON_B64 \
            -e AUCTION_LAUNCHER_KEYSTORE_PASSWORD \
            -e AUCTION_LAUNCHER_FOUNDRY_ACCOUNT \
            -e MIN_SIGNER_BALANCE_WEI \
            -e MODE_INPUT \
            -e CONFIRM_LIVE_BROADCAST_INPUT \
            -e RUN_HOURS_INPUT \
            -e MIN_OPEN_AUCTION_VALUE_USD_INPUT \
            -e COWBOT_MIN_VALUE_USD_INPUT \
            -e ALLOW_PUBLIC_RPC_INPUT \
            -e RPC_URL_OVERRIDE_INPUT \
            -e BYPASS_PROPOSER_DEFENDER_CHECK_INPUT \
            -e CONFIRM_BYPASS_PROPOSER_DEFENDER_CHECK_INPUT \
            -e GITHUB_SERVER_URL \
            -e GITHUB_REPOSITORY \
            -e GITHUB_EVENT_NAME \
            -e GITHUB_RUN_ID \
            -e GITHUB_RUN_ATTEMPT \
            -v "$PWD/.github/dtf-operator.yml:/config/dtf-operator.yml:ro" \
            -v "$PWD/proposer-data:/data" \
            "$DTF_OPERATOR_IMAGE" \
            node dist/cli/run-github-proposer.js

      - name: Stop sidecar and remove local state
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          docker stop --time 15 cliproxy >/dev/null 2>&1 || true
          docker rm -f cliproxy >/dev/null 2>&1 || true
          docker network rm dtf-inference >/dev/null 2>&1 || true
          sudo rm -rf cliproxy-gitstore 2>/dev/null || rm -rf cliproxy-gitstore

      - name: Summarize proposer artifacts
        if: always() && steps.pull_image.outcome == 'success'
        shell: bash
        run: |
          set -euo pipefail
          touch "$GITHUB_STEP_SUMMARY"
          docker run --rm \
            --platform linux/amd64 \
            -e GITHUB_STEP_SUMMARY=/github-step-summary \
            -v "$PWD/proposer-data:/data:ro" \
            -v "$GITHUB_STEP_SUMMARY:/github-step-summary" \
            "$DTF_OPERATOR_IMAGE" \
            node dist/cli/summarize-github-proposer-artifacts.js /data

      - name: Upload proposer artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: dtf-proposer-${{ inputs.mode || github.event_name }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: proposer-data
          if-no-files-found: warn

name: DTF Proposer

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: Safe proposer mode to run
        required: true
        default: dry-run
        type: choice
        options: [dry-run, observe-only, live-one-cycle]
      confirm_live_broadcast:
        description: Confirm manual live mode may broadcast transactions
        required: false
        default: false
        type: boolean
      run_hours:
        description: Optional RUN_HOURS override for manual testing
        required: false
        default: ''
        type: string
      min_open_auction_value_usd:
        description: Optional minimum residual auction value to open, in USD
        required: false
        default: ''
        type: string
      cowbot_min_value_usd:
        description: Optional CowBot minimum bid value, in USD
        required: false
        default: ''
        type: string
      resume_existing_rebalance:
        description: Explicitly continue or reopen an already executed rebalance
        required: false
        default: false
        type: boolean
      allow_public_rpc:
        description: Allow known public fallback RPCs for observe-only testing
        required: false
        default: false
        type: boolean
      rpc_url_override:
        description: Optional RPC URL for this dispatch only
        required: false
        default: ''
        type: string
      confirm_bypass_proposer_defender_check:
        description: Type BYPASS_PROPOSER_DEFENDER_CHECK to bypass the self-check in live mode
        required: false
        default: ''
        type: string

permissions:
  contents: read
  packages: read

env:
  # This disposable live-test branch builds the exact reviewed source commit locally.
  DTF_OPERATOR_IMAGE: dtf-operator-live-test:1277e66
  CLI_PROXY_IMAGE: ${{ vars.CLI_PROXY_IMAGE || 'eceasy/cli-proxy-api@sha256:2d402a3edfbfa0612d7694345f7a05008fe8ce1915fde00ec9adb82afeb370c9' }}

jobs:
  proposer:
    if: ${{ github.repository == 'tbrent/dtf-operator-template' && github.event_name == 'workflow_dispatch' && github.ref_name == 'test/gitstore-live-d45e' && vars.OPERATOR_AUTHORITY_MODE == 'git-authoritative' }}
    runs-on: ubuntu-latest
    # Signer serialization is intentionally independent from Defender. This is
    # safe only because each workflow has a distinct CPA OAuth GitStore/login.
    concurrency:
      group: dtf-proposer-signer-${{ github.repository_id }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Checkout reviewed operator source
        uses: actions/checkout@v4
        with:
          repository: tbrent/dtf-operator
          ref: 1277e6651e8db4dd127eda22f07385554fb7faec
          path: operator-src

      - name: Build reviewed operator image
        shell: bash
        run: |
          set -euo pipefail
          [[ "$(git -C operator-src rev-parse HEAD)" == '1277e6651e8db4dd127eda22f07385554fb7faec' ]]
          docker build --target runtime -t "$DTF_OPERATOR_IMAGE" operator-src

      - name: Assert authoritative cutover inputs
        shell: bash
        env:
          CPA_GITSTORE_URL: ${{ vars.CPA_PROPOSER_GITSTORE_URL }}
          CPA_GITSTORE_BRANCH: ${{ vars.CPA_PROPOSER_GITSTORE_BRANCH }}
          CPA_GITSTORE_TOKEN: ${{ secrets.CPA_PROPOSER_GITSTORE_TOKEN }}
          CPA_OTHER_GITSTORE_URL: ${{ vars.CPA_DEFENDER_GITSTORE_URL }}
          CPA_OTHER_GITSTORE_BRANCH: ${{ vars.CPA_DEFENDER_GITSTORE_BRANCH }}
          INFERENCE_API_KEY: ${{ secrets.INFERENCE_API_KEY }}
          CPA_OAUTH_ISOLATION: ${{ vars.CPA_OAUTH_ISOLATION }}
          PROPOSER_SIGNER_ADDRESS: ${{ vars.PROPOSER_SIGNER_ADDRESS }}
          DEFENDER_SIGNER_ADDRESS: ${{ vars.DEFENDER_SIGNER_ADDRESS }}
        run: |
          set -euo pipefail
          [[ "$DTF_OPERATOR_IMAGE" == 'dtf-operator-live-test:1277e66' ]] || { echo 'unexpected live-test operator image' >&2; exit 2; }
          [[ "$CLI_PROXY_IMAGE" == *@sha256:* ]] || { echo 'CLI_PROXY_IMAGE must be digest-pinned' >&2; exit 2; }
          for required in CPA_GITSTORE_URL CPA_GITSTORE_BRANCH CPA_GITSTORE_TOKEN CPA_OTHER_GITSTORE_URL CPA_OTHER_GITSTORE_BRANCH INFERENCE_API_KEY; do
            [[ -n "${!required:-}" ]] || { echo "$required is required for authoritative mode" >&2; exit 2; }
          done
          [[ "$CPA_GITSTORE_URL:$CPA_GITSTORE_BRANCH" != "$CPA_OTHER_GITSTORE_URL:$CPA_OTHER_GITSTORE_BRANCH" ]] || { echo 'Proposer and Defender CPA GitStore write domains must differ' >&2; exit 2; }
          [[ "$CPA_OAUTH_ISOLATION" == 'separate-gitstores-and-logins' ]] || { echo 'separate CPA OAuth stores/logins must be explicitly acknowledged' >&2; exit 2; }
          [[ "$PROPOSER_SIGNER_ADDRESS" =~ ^0x[0-9a-fA-F]{40}$ && "$DEFENDER_SIGNER_ADDRESS" =~ ^0x[0-9a-fA-F]{40}$ ]] || { echo 'PROPOSER_SIGNER_ADDRESS and DEFENDER_SIGNER_ADDRESS must be EVM addresses' >&2; exit 2; }
          [[ "${PROPOSER_SIGNER_ADDRESS,,}" != "${DEFENDER_SIGNER_ADDRESS,,}" ]] || { echo 'authoritative parallel scheduling requires distinct proposer and defender signer addresses' >&2; exit 2; }

      - name: Verify locally built journal-compatible operator image
        id: pull_image
        shell: bash
        run: |
          set -euo pipefail
          [[ "$(docker image inspect "$DTF_OPERATOR_IMAGE" --format '{{.Os}}/{{.Architecture}}')" == linux/amd64 ]]

      - name: Start GitStore-backed CLIProxyAPI
        shell: bash
        env:
          GITSTORE_GIT_URL: ${{ vars.CPA_PROPOSER_GITSTORE_URL }}
          GITSTORE_GIT_BRANCH: ${{ vars.CPA_PROPOSER_GITSTORE_BRANCH }}
          GITSTORE_GIT_TOKEN: ${{ secrets.CPA_PROPOSER_GITSTORE_TOKEN }}
          GITSTORE_GIT_USERNAME: ${{ vars.CPA_GITSTORE_GIT_USERNAME }}
          MANAGEMENT_PASSWORD: ${{ secrets.INFERENCE_API_KEY }}
        run: |
          set -euo pipefail
          mkdir -m 700 -p cliproxy-gitstore
          docker network create dtf-inference >/dev/null 2>&1 || true
          docker run -d --name cliproxy --network dtf-inference -p 127.0.0.1:8317:8317 \
            -e GITSTORE_GIT_URL -e GITSTORE_GIT_BRANCH -e GITSTORE_GIT_TOKEN -e GITSTORE_GIT_USERNAME \
            -e MANAGEMENT_PASSWORD -e GITSTORE_LOCAL_PATH=/state \
            -v "$PWD/cliproxy-gitstore:/state" "$CLI_PROXY_IMAGE" /CLIProxyAPI/CLIProxyAPI
          for _ in {1..60}; do
            curl -sf -H "Authorization: Bearer $MANAGEMENT_PASSWORD" http://127.0.0.1:8317/v1/models >/dev/null && exit 0
            sleep 1
          done
          echo 'CLIProxyAPI did not become ready; inspect the private GitStore and sidecar logs outside this credential-bearing workflow' >&2
          exit 2

      - name: Verify GitStore OAuth state
        shell: bash
        env:
          INFERENCE_API_KEY: ${{ secrets.INFERENCE_API_KEY }}
        run: |
          set -euo pipefail
          auth_files="$(curl -fsS -H "Authorization: Bearer $INFERENCE_API_KEY" http://127.0.0.1:8317/v0/management/auth-files)"
          [[ "$auth_files" != *'"files":[]'* ]] || { echo 'GitStore contains no OAuth records' >&2; exit 2; }

      - name: Run proposer
        shell: bash
        env:
          INFERENCE_API_KEY: ${{ secrets.INFERENCE_API_KEY }}
          RPC_URL: ${{ secrets.RPC_URL || vars.RPC_URL }}
          MAINNET_RPC_URL: ${{ secrets.MAINNET_RPC_URL || vars.MAINNET_RPC_URL }}
          BSC_RPC_URL: ${{ secrets.BSC_RPC_URL || vars.BSC_RPC_URL }}
          BASE_RPC_URL: ${{ secrets.BASE_RPC_URL || vars.BASE_RPC_URL }}
          ALLOW_SYNTHETIC_SIGNAL_STRATEGY_VAR: ${{ vars.ALLOW_SYNTHETIC_SIGNAL_STRATEGY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          DEFENDER_EMAIL_TO: ${{ secrets.DEFENDER_EMAIL_TO || vars.DEFENDER_EMAIL_TO }}
          DEFENDER_EMAIL_FROM: ${{ secrets.DEFENDER_EMAIL_FROM || vars.DEFENDER_EMAIL_FROM }}
          INFERENCE_AUTH_ALERT_COOLDOWN_SECONDS: ${{ vars.INFERENCE_AUTH_ALERT_COOLDOWN_SECONDS }}
          PROPOSER_KEYSTORE_JSON_B64: ${{ secrets.PROPOSER_KEYSTORE_JSON_B64 }}
          PROPOSER_KEYSTORE_PASSWORD: ${{ secrets.PROPOSER_KEYSTORE_PASSWORD }}
          FOUNDRY_ACCOUNT: ${{ secrets.FOUNDRY_ACCOUNT }}
          SIGNER_ADDRESS: ${{ secrets.SIGNER_ADDRESS || vars.SIGNER_ADDRESS }}
          PROPOSER_SIGNER_ADDRESS: ${{ vars.PROPOSER_SIGNER_ADDRESS }}
          AUCTION_LAUNCHER_KEYSTORE_JSON_B64: ${{ secrets.AUCTION_LAUNCHER_KEYSTORE_JSON_B64 }}
          AUCTION_LAUNCHER_KEYSTORE_PASSWORD: ${{ secrets.AUCTION_LAUNCHER_KEYSTORE_PASSWORD }}
          AUCTION_LAUNCHER_FOUNDRY_ACCOUNT: ${{ secrets.AUCTION_LAUNCHER_FOUNDRY_ACCOUNT }}
          MIN_SIGNER_BALANCE_WEI: ${{ vars.MIN_SIGNER_BALANCE_WEI || '1' }}
          MODE_INPUT: ${{ inputs.mode || '' }}
          CONFIRM_LIVE_BROADCAST_INPUT: ${{ inputs.confirm_live_broadcast || false }}
          RUN_HOURS_INPUT: ${{ inputs.run_hours }}
          MIN_OPEN_AUCTION_VALUE_USD_INPUT: ${{ inputs.min_open_auction_value_usd }}
          COWBOT_MIN_VALUE_USD_INPUT: ${{ inputs.cowbot_min_value_usd }}
          ALLOW_PUBLIC_RPC_INPUT: ${{ inputs.allow_public_rpc || false }}
          RESUME_EXISTING_REBALANCE_INPUT: ${{ inputs.resume_existing_rebalance || false }}
          RPC_URL_OVERRIDE_INPUT: ${{ inputs.rpc_url_override }}
          BYPASS_PROPOSER_DEFENDER_CHECK_INPUT: ${{ inputs.confirm_bypass_proposer_defender_check == 'BYPASS_PROPOSER_DEFENDER_CHECK' }}
          CONFIRM_BYPASS_PROPOSER_DEFENDER_CHECK_INPUT: ${{ inputs.confirm_bypass_proposer_defender_check }}
        run: |
          set -euo pipefail
          mkdir -p proposer-data
          docker run --rm --network dtf-inference \
            -e DTF_OPERATOR_CONFIG=/config/dtf-operator.yml -e OUT_ROOT=/data \
            -e INFERENCE_BASE_URL=http://cliproxy:8317/v1 -e INFERENCE_API_KEY \
            -e INFERENCE_AUTH_ALERT_COOLDOWN_SECONDS -e RESEND_API_KEY -e DEFENDER_EMAIL_TO -e DEFENDER_EMAIL_FROM \
            -e RPC_URL -e MAINNET_RPC_URL -e BSC_RPC_URL -e BASE_RPC_URL -e ALLOW_SYNTHETIC_SIGNAL_STRATEGY_VAR \
            -e PROPOSER_KEYSTORE_JSON_B64 -e PROPOSER_KEYSTORE_PASSWORD -e FOUNDRY_ACCOUNT -e SIGNER_ADDRESS -e PROPOSER_SIGNER_ADDRESS \
            -e AUCTION_LAUNCHER_KEYSTORE_JSON_B64 -e AUCTION_LAUNCHER_KEYSTORE_PASSWORD -e AUCTION_LAUNCHER_FOUNDRY_ACCOUNT \
            -e MIN_SIGNER_BALANCE_WEI -e MODE_INPUT -e CONFIRM_LIVE_BROADCAST_INPUT \
            -e RUN_HOURS_INPUT -e MIN_OPEN_AUCTION_VALUE_USD_INPUT -e COWBOT_MIN_VALUE_USD_INPUT \
            -e ALLOW_PUBLIC_RPC_INPUT -e RESUME_EXISTING_REBALANCE_INPUT -e RPC_URL_OVERRIDE_INPUT \
            -e BYPASS_PROPOSER_DEFENDER_CHECK_INPUT -e CONFIRM_BYPASS_PROPOSER_DEFENDER_CHECK_INPUT \
            -e GITHUB_SERVER_URL -e GITHUB_REPOSITORY -e GITHUB_EVENT_NAME -e GITHUB_RUN_ID -e GITHUB_RUN_ATTEMPT \
            -v "$PWD/.github/dtf-operator.yml:/config/dtf-operator.yml:ro" -v "$PWD/proposer-data:/data" \
            "$DTF_OPERATOR_IMAGE" node dist/cli/run-github-proposer.js

      - name: Stop sidecar and remove local copies
        if: always()
        shell: bash
        run: |
          docker stop --time 15 cliproxy >/dev/null 2>&1 || true
          docker rm -f cliproxy >/dev/null 2>&1 || true
          docker network rm dtf-inference >/dev/null 2>&1 || true
          rm -rf cliproxy-gitstore

      - name: Summarize proposer artifacts
        if: always() && steps.pull_image.outcome == 'success'
        shell: bash
        run: |
          set -euo pipefail
          touch "$GITHUB_STEP_SUMMARY"
          docker run --rm \
            -e GITHUB_STEP_SUMMARY=/github-step-summary \
            -v "$PWD/proposer-data:/data:ro" \
            -v "$GITHUB_STEP_SUMMARY:/github-step-summary" \
            "$DTF_OPERATOR_IMAGE" \
            node dist/cli/summarize-github-proposer-artifacts.js /data

      - name: Upload proposer artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dtf-proposer-${{ inputs.mode || github.event_name }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: proposer-data
          if-no-files-found: warn

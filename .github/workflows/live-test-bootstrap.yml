name: Live GitStore Test Bootstrap

on:
  workflow_dispatch:
    inputs:
      fund_proposer_wei:
        description: Amount of Base ETH to transfer from the existing Defender signer to the isolated Proposer signer
        required: false
        default: '0'
        type: string

permissions:
  contents: read

env:
  DTF_OPERATOR_IMAGE: dtf-operator-live-test:1277e66
  CLI_PROXY_IMAGE: eceasy/cli-proxy-api@sha256:2d402a3edfbfa0612d7694345f7a05008fe8ce1915fde00ec9adb82afeb370c9

jobs:
  bootstrap:
    if: ${{ github.repository == 'tbrent/dtf-operator-template' && github.ref_name == 'test/gitstore-live-d45e' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout reviewed operator source
        uses: actions/checkout@v4
        with:
          repository: tbrent/dtf-operator
          ref: 1277e6651e8db4dd127eda22f07385554fb7faec
          path: operator-src

      - name: Build reviewed operator image
        shell: bash
        run: |
          set -euo pipefail
          [[ "$(git -C operator-src rev-parse HEAD)" == '1277e6651e8db4dd127eda22f07385554fb7faec' ]]
          docker build --target runtime -t "$DTF_OPERATOR_IMAGE" operator-src

      - name: Inspect signers and fund isolated Proposer
        shell: bash
        env:
          BASE_RPC_URL: ${{ secrets.BASE_RPC_URL }}
          DEFENDER_KEYSTORE_JSON_B64: ${{ secrets.DEFENDER_KEYSTORE_JSON_B64 }}
          DEFENDER_KEYSTORE_PASSWORD: ${{ secrets.DEFENDER_KEYSTORE_PASSWORD }}
          DEFENDER_FOUNDRY_ACCOUNT: ${{ secrets.DEFENDER_FOUNDRY_ACCOUNT }}
          PROPOSER_SIGNER_ADDRESS: ${{ vars.PROPOSER_SIGNER_ADDRESS }}
          FUND_PROPOSER_WEI: ${{ inputs.fund_proposer_wei }}
        run: |
          set -euo pipefail
          [[ -n "$BASE_RPC_URL" && -n "$DEFENDER_KEYSTORE_JSON_B64" && -n "$DEFENDER_KEYSTORE_PASSWORD" && -n "$DEFENDER_FOUNDRY_ACCOUNT" ]]
          [[ "$PROPOSER_SIGNER_ADDRESS" =~ ^0x[0-9a-fA-F]{40}$ ]]
          [[ "$FUND_PROPOSER_WEI" =~ ^[0-9]+$ ]]
          mkdir -m 700 runtime
          printf '%s' "$DEFENDER_KEYSTORE_JSON_B64" | base64 --decode > "runtime/$DEFENDER_FOUNDRY_ACCOUNT"
          printf '%s' "$DEFENDER_KEYSTORE_PASSWORD" > runtime/password
          chmod 600 "runtime/$DEFENDER_FOUNDRY_ACCOUNT" runtime/password
          defender_signer="$(docker run --rm -v "$PWD/runtime:/runtime:ro" "$DTF_OPERATOR_IMAGE" cast wallet address --keystore "/runtime/$DEFENDER_FOUNDRY_ACCOUNT" --password-file /runtime/password)"
          defender_balance="$(docker run --rm -e BASE_RPC_URL "$DTF_OPERATOR_IMAGE" sh -c 'cast balance "$1" --rpc-url "$BASE_RPC_URL"' sh "$defender_signer")"
          proposer_balance="$(docker run --rm -e BASE_RPC_URL "$DTF_OPERATOR_IMAGE" sh -c 'cast balance "$1" --rpc-url "$BASE_RPC_URL"' sh "$PROPOSER_SIGNER_ADDRESS")"
          echo "defender_signer=$defender_signer"
          echo "defender_balance_wei=$defender_balance"
          echo "proposer_signer=$PROPOSER_SIGNER_ADDRESS"
          echo "proposer_balance_wei=$proposer_balance"
          if (( FUND_PROPOSER_WEI > 0 && proposer_balance < FUND_PROPOSER_WEI )); then
            docker run --rm \
              -e BASE_RPC_URL \
              -v "$PWD/runtime:/runtime:ro" \
              "$DTF_OPERATOR_IMAGE" \
              cast send "$PROPOSER_SIGNER_ADDRESS" \
                --value "$FUND_PROPOSER_WEI" \
                --keystore "/runtime/$DEFENDER_FOUNDRY_ACCOUNT" \
                --password-file /runtime/password \
                --rpc-url "$BASE_RPC_URL" \
                --json
          fi

      - name: Split existing OAuth records into isolated stores
        shell: bash
        env:
          CLIPROXY_AUTH_TGZ_B64: ${{ secrets.CLIPROXY_AUTH_TGZ_B64 }}
        run: |
          set -euo pipefail
          [[ -n "$CLIPROXY_AUTH_TGZ_B64" ]]
          mkdir -m 700 cliproxy-auth proposer-auth defender-auth
          printf '%s' "$CLIPROXY_AUTH_TGZ_B64" | base64 --decode | tar --no-same-owner -xzf - -C cliproxy-auth
          mapfile -d '' auth_files < <(find cliproxy-auth -type f -name '*.json' -print0 | sort -z)
          echo "oauth_record_count=${#auth_files[@]}"
          (( ${#auth_files[@]} >= 2 )) || { echo 'at least two independent OAuth records are required for isolated Proposer and Defender GitStores' >&2; exit 2; }
          cp "${auth_files[0]}" "proposer-auth/$(basename "${auth_files[0]}")"
          cp "${auth_files[1]}" "defender-auth/$(basename "${auth_files[1]}")"

      - name: Seed isolated CPA GitStores
        shell: bash
        env:
          CPA_PROPOSER_GITSTORE_URL: ${{ vars.CPA_PROPOSER_GITSTORE_URL }}
          CPA_PROPOSER_GITSTORE_BRANCH: ${{ vars.CPA_PROPOSER_GITSTORE_BRANCH }}
          CPA_PROPOSER_GITSTORE_TOKEN: ${{ secrets.CPA_PROPOSER_GITSTORE_TOKEN }}
          CPA_DEFENDER_GITSTORE_URL: ${{ vars.CPA_DEFENDER_GITSTORE_URL }}
          CPA_DEFENDER_GITSTORE_BRANCH: ${{ vars.CPA_DEFENDER_GITSTORE_BRANCH }}
          CPA_DEFENDER_GITSTORE_TOKEN: ${{ secrets.CPA_DEFENDER_GITSTORE_TOKEN }}
          CPA_GITSTORE_GIT_USERNAME: ${{ vars.CPA_GITSTORE_GIT_USERNAME }}
        run: |
          set -euo pipefail
          export GITSTORE_GIT_TOKEN="$CPA_PROPOSER_GITSTORE_TOKEN"
          scripts/seed-cliproxy-gitstore \
            --git-url "$CPA_PROPOSER_GITSTORE_URL" \
            --git-branch "$CPA_PROPOSER_GITSTORE_BRANCH" \
            --git-username "$CPA_GITSTORE_GIT_USERNAME" \
            --cliproxy-auth-dir proposer-auth \
            --cliproxy-image "$CLI_PROXY_IMAGE"
          export GITSTORE_GIT_TOKEN="$CPA_DEFENDER_GITSTORE_TOKEN"
          scripts/seed-cliproxy-gitstore \
            --git-url "$CPA_DEFENDER_GITSTORE_URL" \
            --git-branch "$CPA_DEFENDER_GITSTORE_BRANCH" \
            --git-username "$CPA_GITSTORE_GIT_USERNAME" \
            --cliproxy-auth-dir defender-auth \
            --cliproxy-image "$CLI_PROXY_IMAGE"

      - name: Seed and cut over Defender journal
        shell: bash
        env:
          OPERATOR_STATE_GIT_URL: ${{ vars.OPERATOR_STATE_GIT_URL }}
          OPERATOR_STATE_GIT_BRANCH: ${{ vars.OPERATOR_STATE_GIT_BRANCH }}
          OPERATOR_STATE_GIT_TOKEN: ${{ secrets.OPERATOR_STATE_GIT_TOKEN }}
          OPERATOR_STATE_MODE: git-authoritative
        run: |
          set -euo pipefail
          mkdir -m 700 defender-data
          operator_state() {
            docker run --rm \
              -e OPERATOR_STATE_GIT_URL \
              -e OPERATOR_STATE_GIT_BRANCH \
              -e OPERATOR_STATE_GIT_TOKEN \
              -e OPERATOR_STATE_MODE \
              -v "$PWD/defender-data:/data" \
              "$DTF_OPERATOR_IMAGE" \
              node dist/cli/run-defender-state.js "$@" --state-root /data
          }
          operator_state seed
          operator_state validate
          operator_state cutover
          rm -rf defender-data
          mkdir -m 700 defender-data
          operator_state restore
          operator_state validate
          operator_state status

      - name: Remove local credential copies
        if: always()
        shell: bash
        run: rm -rf runtime cliproxy-auth proposer-auth defender-auth defender-data

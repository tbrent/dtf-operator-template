# Non-secret operator configuration for this deployment repository.
# Top-level folioAddress and chainId are always the Proposer target. Defender
# also uses them when defender.folios is omitted or empty.
version: 1

# Required. Set both values for the DTF/Folio the Proposer operates.
folioAddress: "0xd45e4170834a803D084b2bB145c9ad08f3BdD651"
chainId: 8453

proposer:
  # Scheduled workflow defaults. The workflow wakes up frequently, then the
  # proposer script targets auction starts at least this far apart.
  rebalanceCadence: 30d
  runHours: 4
  pollSeconds: 20
  cowbotSeconds: 30

  # Address used only for dry-run optimistic proposal simulation. This must be
  # an address with available optimistic proposal throttle charges on the
  # trading governor. Set this to the signer address printed by scripts/setup-github-proposer.
  optimisticProposerAddress: "0xcaCdB557966F13B175ca9962904fB79F82b67232"

  # Optional. Set only when this workflow should open auctions and run CowBot.
  auctionLauncherAddress:

  # Optional. Leave blank for the runtime defaults.
  minOpenAuctionValueUsd:
  cowbotMinValueUsd:
  allowSyntheticSignalStrategy: true
  # Configure the endpoint with PROPOSER_INFERENCE_MODE /
  # PROPOSER_INFERENCE_PROVIDER variables plus PROPOSER_INFERENCE_BASE_URL and
  # PROPOSER_INFERENCE_API_KEY secrets. Direct HTTPS needs no GitStore.
  inference:
    model: gpt-5.6-luna
    reasoningEffort: medium

  # Required for efficient first runs. Set fromBlock to a block before this
  # DTF/Folio's first relevant governance proposal, then tune chunking only if
  # your RPC provider cannot handle large eth_getLogs ranges.
  proposalScan:
    fromBlock: 45000000
    logChunkBlocks:
    logChunkDelayMs:

  # Optional display/link overrides.
  display:
    registerBaseUrl:
    registerOriginUrl:
    chainLabel:

defender:
  # Production safety maximum: exactly 14 days (1,209,600 seconds). The runtime
  # rejects governors and proposals whose veto delay plus voting period exceeds
  # this configured maximum; equality is accepted.
  maxVetoDelayPlusPeriod: 1209600s

  # The workflow wakes up hourly, then this frequency gate controls the minimum
  # scan interval. GitHub schedules are best-effort, so actual gaps can be longer.
  frequencyMinutes: 60
  runHours: 1
  pollSeconds: 20
  waitActiveSeconds: 120

  # When this list is present and non-empty,
  # it replaces the top-level target for Defender only; Proposer still targets
  # the top-level Folio. Keep one entry per Defender target and set fromBlock to
  # a block before that Folio's first relevant governance proposal. One workflow
  # invocation coordinates all entries serially; do not create a job matrix.
  folios:
    - folioAddress: "0xa0fe4e0aeca5479705ce996615b2eacb6b6a10fb"
      chainId: 56
      governorAddress: "0xf6F73C085b22D791705b8173712F37A2FeEE58e1"
      proposalScan:
        fromBlock: 102500000
    - folioAddress: "0xd7ce7a841310982acd976d1a6fe7bb6063c5689d"
      chainId: 56
      governorAddress: "0x11DdDE7845764C5317042c51e7e5EC665db33055"
      proposalScan:
        fromBlock: 102500000
    - folioAddress: "0x75617e7653f86f074cc30b9fd4ebf52ba9b62247"
      chainId: 56
      governorAddress: "0x736242C3fB5cFeEE70267D5C3B123211b760C966"
      proposalScan:
        fromBlock: 102500000
    - folioAddress: "0x290bcc0fd5096cc3261ae2021841c7bc67cb0f51"
      chainId: 56
      governorAddress: "0x056CCC0F4CEDc4246F79cBf5Fe40F4D170Cb6769"
      proposalScan:
        fromBlock: 102500000
    - folioAddress: "0xf571fe3f0d74521bc7310b111faea931c748f27b"
      chainId: 56
      governorAddress: "0x72b4Be10fBb28Af7b227C1db48EdC3f2B111Ec6E"
      proposalScan:
        fromBlock: 102500000

  # Single-Folio fallback. This is used only when defender.folios is omitted or
  # empty. The runtime automatically shrinks rejected or timed-out
  # eth_getLogs ranges and checkpoints each successful chunk. Leave chunking
  # blank unless an RPC provider needs an explicit operational override.
  proposalScan:
    fromBlock: 102500000
    logChunkBlocks: 50000
    logChunkDelayMs:

  notifications:
    # May also be supplied through DEFENDER_EMAIL_TO GitHub Secret.
    emailTo:

  # The production workflow requires a dedicated Defender signer and fails its
  # isolation preflight when signer secrets are missing.
  alertOnlyWithoutSigner: false
  # Model settings are public. Configure the endpoint with the
  # DEFENDER_INFERENCE_MODE / DEFENDER_INFERENCE_PROVIDER variables plus
  # DEFENDER_INFERENCE_BASE_URL and DEFENDER_INFERENCE_API_KEY secrets; direct
  # HTTPS mode needs no GitStore.
  inference:
    model: gpt-5.6-luna
    reasoningEffort: medium

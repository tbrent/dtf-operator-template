# Non-secret operator configuration for a private fork.
# Top-level folioAddress and chainId are always the Proposer target. Defender
# also uses them when defender.folios is omitted or empty.
version: 1

# Required. Set both values for the DTF/Folio the Proposer operates.
folioAddress:
chainId:

proposer:
  # Scheduled workflow defaults. The workflow wakes up frequently, then the
  # proposer script targets auction starts at least this far apart.
  rebalanceCadence: 30d
  runHours: 4
  pollSeconds: 20
  cowbotSeconds: 30

  # Address used only for dry-run optimistic proposal simulation. This must be
  # an address with available optimistic proposal throttle charges on the
  # trading governor. Set this to the signer address printed by scripts/setup-github-proposer.
  optimisticProposerAddress:

  # Optional. Set only when this workflow should open auctions and run CowBot.
  auctionLauncherAddress:

  # Optional. Leave blank for the runtime defaults.
  minOpenAuctionValueUsd:
  cowbotMinValueUsd:
  allowSyntheticSignalStrategy: false
  inference:
    model: gpt-5.5
    reasoningEffort: medium

  # Required for efficient first runs. Set fromBlock to a block before this
  # DTF/Folio's first relevant governance proposal, then tune chunking only if
  # your RPC provider cannot handle large eth_getLogs ranges.
  proposalScan:
    fromBlock:
    logChunkBlocks:
    logChunkDelayMs:

  # Optional display/link overrides.
  display:
    registerBaseUrl:
    registerOriginUrl:
    chainLabel:

defender:
  # The workflow wakes up every 15 minutes, then this frequency gate skips extra
  # runs so forks can tune cadence from this one config file. This value may be
  # raised above 30; GitHub schedules are best-effort, so actual gaps can be longer.
  frequencyMinutes: 30
  runHours: 1
  pollSeconds: 20
  waitActiveSeconds: 120

  # Multi-Folio production example only. When this list is present and non-empty,
  # it replaces the top-level target for Defender only; Proposer still targets
  # the top-level Folio. Keep one entry per Defender target and set fromBlock to
  # a block before that Folio's first relevant governance proposal.
  # folios:
  #   - folioAddress: "<FIRST_FOLIO_ADDRESS>"
  #     chainId: 56
  #     governorAddress: "<FIRST_TRADING_GOVERNOR_ADDRESS>"
  #     proposalScan:
  #       fromBlock: 12345678
  #   - folioAddress: "<SECOND_FOLIO_ADDRESS>"
  #     chainId: 8453
  #     governorAddress: "<SECOND_TRADING_GOVERNOR_ADDRESS>"
  #     proposalScan:
  #       fromBlock: 23456789

  # Legacy single-Folio fallback. This is used only when defender.folios is
  # omitted or empty. The runtime automatically shrinks rejected or timed-out
  # eth_getLogs ranges and checkpoints each successful chunk. Leave chunking
  # blank unless an RPC provider needs an explicit operational override.
  proposalScan:
    fromBlock:
    logChunkBlocks:
    logChunkDelayMs:

  notifications:
    # May also be supplied through DEFENDER_EMAIL_TO GitHub Secret.
    emailTo:

  # AI is the sole authority for deciding mandate compliance and whether a
  # proposal should be approved or vetoed. Deterministic processing supports
  # the review but does not make mandate-compliance decisions.
  requireAiApproval: true
  # If signer secrets are missing, the workflow sends email alerts instead of
  # casting vetoes. If email is also missing, it fails hard.
  alertOnlyWithoutSigner: true
  inference:
    model: gpt-5.5
    reasoningEffort: medium

# Public fork operator configuration.
# Choose the DTF/Folio this fork operates, then edit folioAddress and chainId in
# your fork before adding the documented GitHub Secrets.
version: 1

# Required. Set both values for the DTF/Folio this fork operates.
folioAddress: "0xd45e4170834a803D084b2bB145c9ad08f3BdD651"
chainId: 8453

marketData:
  scoutEtlBaseUrl: https://scout-etl.reserve-337.workers.dev
  scoutEtlProvider: messari

proposer:
  # Scheduled workflow defaults. The workflow wakes up frequently, then the
  # proposer script targets auction starts at least this far apart.
  rebalanceCadence: 30d
  runHours: 4
  pollSeconds: 20
  cowbotSeconds: 30

  # Address used only for dry-run optimistic proposal simulation. This must be
  # an address with available optimistic proposal throttle charges on the
  # trading governor. Set this to the signer address printed by scripts/setup-github-proposer.
  optimisticProposerAddress: "0x655D755E02da56C469A8a5a8b0EFB80d033A199E"

  # Optional. Set only when this workflow should open auctions and run CowBot.
  auctionLauncherAddress: "0x655D755E02da56C469A8a5a8b0EFB80d033A199E"

  # Optional. Leave blank for the runtime defaults.
  minOpenAuctionValueUsd:
  cowbotMinValueUsd:
  allowSyntheticSignalStrategy: false

  # Optional scan tuning for RPC providers that cannot handle large log ranges.
  proposalScan:
    fromBlock:
    logChunkBlocks:
    logChunkDelayMs:

  # Optional display/link overrides.
  display:
    registerBaseUrl:
    registerOriginUrl:
    chainLabel:

defender:
  # The workflow wakes up every 15 minutes, then this frequency gate skips extra
  # runs so forks can tune cadence from this one config file.
  frequencyMinutes: 30
  runHours: 1
  pollSeconds: 20
  waitActiveSeconds: 120

  # Optional scan tuning for RPC providers that cannot handle large log ranges.
  proposalScan:
    fromBlock: 46032943
    logChunkBlocks:
    logChunkDelayMs:

  notifications:
    # May also be supplied through DEFENDER_EMAIL_TO GitHub Secret.
    emailTo: taylor.brent@reserve.org

  # Approvals always require Codex judgement. Deterministic hard vetoes can veto
  # before AI when they are low false-positive checks.
  requireAiApproval: true
  # If signer secrets are missing, the workflow sends email alerts instead of
  # casting vetoes. If email is also missing, it fails hard.
  alertOnlyWithoutSigner: true
